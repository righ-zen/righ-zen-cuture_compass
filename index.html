<html lang="en">
<head>
<meta charset="UTF-8">

<!-- 海外のモダンアプリで人気の丸みと高級感のある Nunito フォントを採用 -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-navy:#12233F;
    --midnight:#0B1626;
    --brass:#C89B3C;
    --brass-light:#E4C878;
    --parchment:#F7F2E7;
    --parchment-dim:#EFE7D3;
    --sage:#6E8B74;
    --rust:#B5533C;
    --text-main:#1F2A3C;
    --text-mute:#5B6B82;
    --line:#DCD3BC;

    --display:'Nunito', sans-serif;
    --body:'Nunito', sans-serif;
    --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--body);
    color:var(--text-main);
    background:var(--midnight);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    margin:0;
    overflow:hidden;
  }

  /* ---------- phone shell ---------- */
  .phone{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    /* 本物のノッチを避ける安全なパディング */
    padding-top: 44px;
    background:var(--parchment);
  }
  .statusbar{
    display: none !important;
  }

  /* ---------- app body / screens ---------- */
  .app-body{
    flex:1 1 auto;
    position:relative;
    overflow:hidden;
    background:var(--parchment);
  }
  .screen{
    position:absolute;
    inset:0;
    overflow-y:auto;
    padding:16px 20px 32px;
    opacity:0;
    visibility:hidden;
    transform:translateY(6px);
    transition:opacity 0.22s ease, transform 0.22s ease;
    scrollbar-width:none;
  }
  .screen::-webkit-scrollbar{display:none;}
  .screen.active{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
    z-index:10;
  }

  .screen-title{
    font-family:var(--display);
    font-weight:900;
    font-size:28px;
    letter-spacing:-0.01em;
    margin:10px 0 2px;
    color:var(--ink-navy);
  }
  .screen-sub{
    font-family:var(--body);
    font-weight:700;
    font-size:14px;
    color:var(--text-mute);
    margin:0 0 18px;
    line-height:1.4;
  }
  .eyebrow{
    font-family:var(--display);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--brass);
    font-weight:900;
  }

  /* ---------- 洗練されたモダンフラットカード ---------- */
  .card{
    background:#fff;
    border:2px solid var(--line);
    border-radius:24px;
    padding:20px;
    margin-bottom:16px;
    box-shadow: 0 2px 4px rgba(18, 35, 63, 0.03);
  }
  .card-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}

  /* ---------- ぽってり感のある立体3Dボタン ---------- */
  button{font-family:var(--body);}
  .btn{
    appearance:none;
    border:none;
    border-radius:20px;
    padding:15px 22px;
    font-family:var(--body);
    font-weight:800;
    font-size:16px;
    cursor:pointer;
    position:relative;
    transition: all 0.1s ease;
  }
  .btn-primary {
    background: var(--ink-navy);
    color: var(--parchment);
    box-shadow: 0 4px 0 #0b1626;
  }
  .btn-primary:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 #0b1626;
  }
  .btn-brass {
    background: var(--brass);
    color: var(--midnight);
    box-shadow: 0 4px 0 #96732b;
  }
  .btn-brass:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 #96732b;
  }
  .btn-ghost {
    background: #fff;
    color: var(--ink-navy);
    border: 2px solid var(--line);
    box-shadow: 0 4px 0 var(--line);
  }
  .btn-ghost:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 var(--line);
  }
  .btn-block{width:100%;}
  .btn:disabled{opacity:0.45; cursor:not-allowed; transform:none !important; box-shadow:none !important;}

  /* ---------- tab bar ---------- */
  .tabbar{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-around;
    padding:12px 6px 32px; /* 下部に少し余裕を持たせる */
    background:#fff;
    border-top:2px solid var(--line);
    z-index:60;
  }
  .tab{
    background:none; border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--text-mute);
    font-family:var(--display);
    font-weight:800;
    font-size:11px;
    padding:4px 8px;
    border-radius:12px;
    transition:color 0.15s ease;
  }
  .tab svg{width:22px; height:22px; stroke:var(--text-mute); stroke-width:2.2; transition:stroke 0.15s ease;}
  .tab.active{color:var(--ink-navy);}
  .tab.active svg{stroke:var(--brass); fill: rgba(200,155,60,0.1);}

  /* ---------- onboarding overlay ---------- */
  .overlay{
    position:absolute; inset:0; z-index:200;
    background:var(--ink-navy);
    display:flex; flex-direction:column;
    padding:44px 26px 32px;
    color:var(--parchment);
    opacity:1; visibility:visible;
    transition:opacity 0.25s ease, visibility 0.25s ease;
  }
  .overlay.hidden{opacity:0; visibility:hidden; pointer-events:none;}
  .overlay-scroll{flex:1 1 auto; overflow-y:auto; scrollbar-width:none;}
  .overlay-scroll::-webkit-scrollbar{display:none;}

  select, input[type=text], textarea{
    width:100%;
    font-family:var(--body);
    font-weight:700;
    font-size:15px;
    padding:14px;
    border-radius:16px;
    border:2px solid var(--line);
    background:#fff;
    color:var(--text-main);
    outline:none;
  }
  select:focus, input[type=text]:focus, textarea:focus{border-color:var(--brass);}
  label.field-label{
    display:block;
    font-family:var(--display);
    font-weight:800;
    font-size:12px;
    text-transform:uppercase;
    color:var(--text-mute);
    margin:0 0 8px;
  }
  .field{margin-bottom:20px;}

  .overlay select, .overlay input[type=text]{
    background:rgba(255,255,255,0.06);
    border-color:rgba(255,255,255,0.18);
    color:var(--parchment);
  }
  .overlay select option{color:#000;}
  .overlay label.field-label{color:rgba(247,242,231,0.55);}

  ::placeholder{color:#B9B0A0;}

  /* ---------- modal sheet ---------- */
  .modal-overlay{
    position:absolute; inset:0; z-index:300;
    background:rgba(11,22,38,0.5);
    opacity:0; visibility:hidden;
    transition:opacity 0.2s ease, visibility 0.2s ease;
    display:flex; align-items:flex-end;
  }
  .modal-overlay.open{opacity:1; visibility:visible;}
  .modal-sheet{
    width:100%;
    max-height:88%;
    background:var(--parchment);
    border-radius:32px 32px 0 0;
    padding:24px 20px 36px;
    overflow-y:auto;
    transform:translateY(100%);
    transition:transform 0.28s cubic-bezier(.32,.72,0,1);
    scrollbar-width:none;
  }
  .modal-sheet::-webkit-scrollbar{display:none;}
  .modal-overlay.open .modal-sheet{transform:translateY(0);}
  .sheet-handle{
    width:40px; height:6px; border-radius:3px;
    background:var(--line); margin:2px auto 18px;
  }

  /* ---------- misc UI atoms ---------- */
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--display); font-weight:800; font-size:11px;
    padding:6px 12px; border-radius:14px;
    background:var(--parchment-dim); color:var(--text-mute);
  }
  .chip.brass{background:rgba(200,155,60,0.14); color:#8a6a1f;}
  .chip.sage{background:rgba(110,139,116,0.16); color:#2f4734;}
  .chip.rust{background:rgba(181,83,60,0.12); color:var(--rust);}

  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .stat-box{
    background:#fff; border:2px solid var(--line); border-radius:20px;
    padding:16px;
  }
  .stat-num{font-family:var(--display); font-weight:900; font-size:26px; color:var(--ink-navy); line-height:1;}
  .stat-label{font-family:var(--display); font-weight:800; font-size:11px; text-transform:uppercase; color:var(--text-mute); margin-top:6px; display:block;}

  .section-label{
    font-family:var(--display); font-weight:900; font-size:13px; letter-spacing:0.03em; text-transform:uppercase;
    color:var(--text-mute); margin:24px 0 12px; display:flex; align-items:center; justify-content:space-between;
  }

  .list-item{
    display:flex; align-items:center; gap:14px;
    padding:14px 4px; border-bottom:2px solid var(--line);
  }
  .list-item:last-child{border-bottom:none;}
  .li-icon{
    width:38px; height:38px; border-radius:12px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    background:var(--parchment-dim); font-size:18px;
  }
  .li-body{flex:1 1 auto; min-width:0;}
  .li-title{font-weight:800; font-size:14.5px; color:var(--text-main);}
  .li-sub{font-weight:600; font-size:12.5px; color:var(--text-mute); margin-top:2px;}

  /* 丸みのある洗練されたゲージ */
  .quiz-progress{height:12px; border-radius:10px; background:var(--parchment-dim); overflow:hidden; margin-bottom:20px; border: 2px solid var(--line);}
  .quiz-progress-fill{height:100%; background:var(--brass); border-radius:8px; transition:width 0.25s ease;}

  /* chat */
  .bubble{max-width:82%; padding:12px 16px; border-radius:20px; font-size:14.5px; line-height:1.5; font-weight:600;}
  .bubble.user{align-self:flex-end; background:var(--ink-navy); color:var(--parchment); border-bottom-right-radius:4px;}
  .bubble.ai{align-self:flex-start; background:#fff; border:2px solid var(--line); color:var(--text-main); border-bottom-left-radius:4px;}
</style>
</head>

/* キャラクター要素を完全に廃止し、スマートかつ親しみやすいトーンに文言をリチューン */
const memoryStore = {};
async function storeGet(key){
  try{
    if (window.storage && window.storage.get){
      const r = await window.storage.get(key, false);
      return r ? JSON.parse(r.value) : null;
    }
  }catch(e){}
  return memoryStore.hasOwnProperty(key) ? memoryStore[key] : null;
}
async function storeSet(key, value){
  memoryStore[key] = value;
  try{
    if (window.storage && window.storage.set){
      await storeSet(key, JSON.stringify(value), false);
    }
  }catch(e){}
}

function todayStr(d){ const dt = d || new Date(); return dt.toISOString().slice(0,10); }
function fmtDate(iso){ const d = new Date(iso + "T00:00:00"); return d.toLocaleDateString(undefined, { month:"short", day:"numeric" }); }
function fmtDateLong(iso){ const d = new Date(iso + "T00:00:00"); return d.toLocaleDateString(undefined, { weekday:"long", month:"long", day:"numeric" }); }
function dayOfYear(d){ const start = new Date(d.getFullYear(), 0, 0); const diff = d - start; return Math.floor(diff / 86400000); }

function compassDialSVG(stageIndex, opts){
  opts = opts || {}; const size = opts.size || 220; const known = stageIndex !== null && stageIndex !== undefined; const idx = known ? stageIndex : 0; const cx = 100, cy = 108, r = 78; const segAngle = 180/6; let arcs = "";
  for (let i=0;i<6;i++){
    const a0 = -90 + i*segAngle; const a1 = -90 + (i+1)*segAngle - 2; const p0 = polar(cx,cy,r,a0), p1 = polar(cx,cy,r,a1); const stage = DMIS_STAGES[i]; const dim = known && i !== idx; const col = known ? (i===idx ? stage.color : "var(--line)") : "var(--line)";
    arcs += `<path d="M ${p0.x} ${p0.y} A ${r} ${r} 0 0 1 ${p1.x} ${p1.y}" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round" opacity="${dim?0.4:1}"/>`;
  }
  const needleAngle = known ? (-90 + segAngle*idx + segAngle/2) : -90 + segAngle/2;
  return `<svg viewBox="0 0 200 140" width="${size}" height="${size*0.7}">${arcs}<circle cx="${cx}" cy="${cy}" r="7" fill="var(--ink-navy)"/><g style="transform-origin:${cx}px ${cy}px; transform:rotate(${needleAngle+90}deg); transition:transform 1s cubic-bezier(.22,1,.36,1);"><path d="M ${cx} ${cy-58} L ${cx-4} ${cy} L ${cx+4} ${cy} Z" fill="var(--brass)"/></g></svg>`;
}
function polar(cx,cy,r,angleDeg){ const a = (angleDeg-90) * Math.PI/180; return { x: cx + r*Math.cos(a), y: cy + r*Math.sin(a) }; }

function sparkline(values, opts){
  opts = opts || {}; const w = opts.w || 320, h = opts.h || 64, pad = 8; if (!values.length) return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}"></svg>`; const min = 1, max = 5; const stepX = values.length > 1 ? (w - pad*2)/(values.length-1) : 0;
  const pts = values.map((v,i)=>{ const x = pad + stepX*i; const y = h - pad - ((v-min)/(max-min))*(h-pad*2); return [x,y]; });
  const path = pts.map((p,i)=> (i===0?"M":"L")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const dots = pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="var(--brass)"/>`).join("");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none"><path d="${path}" fill="none" stroke="var(--brass)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;
}

function classifyPhase(entries){
  if (entries.length < 3) return { name:"Honeymoon Phase", note:"すべての体験が新鮮で、ポジティブな刺激に満ちている初期段階です。異文化への適応の第一歩を楽しんでください。" };
  const recent = entries.slice(-5).map(e=>e.mood); const avg = recent.reduce((a,b)=>a+b,0)/recent.length;
  if (avg < 2.5) return { name:"Culture Shock Phase", note:"現地の習慣への違和感や疲れが出やすい時期です。これは思考が「異文化の論理」に適応しようと成長している健康な兆候です。" };
  if (avg < 3.6) return { name:"Adjustment Phase", note:"現地の暗黙のルールや生活リズムを徐々に把握し、自分らしい日常のルーティンを確立でき始めている状態です。" };
  return { name:"Acceptance Phase", note:"双方の文化をありのままに受け入れ、どちらの環境下でも自分らしくしなやかに機能できている安定した状態です。" };
}

  const apiMessages = STATE.coachHistory.slice(-16).map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.text }));
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, system: systemPrompt, messages: apiMessages }) });
    const data = await response.json(); const reply = (data.content || []).map(b => b.text || "").join("\n").trim() || "応答の処理にエラーが発生しました。再度入力をお願いいたします。";
    STATE.coachHistory.push({ role:"assistant", text: reply });
  } catch(e) {
    STATE.coachHistory.push({ role:"assistant", text: "ネットワークエラーが発生しました。接続状況を確認し再度お試しください。" });
  }
  await storeSet("coach-history", STATE.coachHistory); renderCoach();
}

/* ================================ TRACK ==================================== */
let trackSelectedMood = null;
function renderTrack(){
  const el = document.getElementById("screen-track"); const today = todayStr(); const already = STATE.tracker.find(e => e.date === today); const phase = classifyPhase(STATE.tracker); const values = STATE.tracker.slice(-14).map(e=>e.mood);
  el.innerHTML = `<div class="eyebrow" style="margin-top:8px;">ADJUSTMENT CURVE LOG</div><div class="screen-title" style="margin-top:2px; font-size:24px;">適応プロセスの記録</div><div class="screen-sub">心理的な波の変動は、未知の環境モデルへ心が適応しようとする正常な推移です。</div>
    <div class="card"><div><span class="chip ${phase.name.includes('Frustration')?'rust':phase.name.includes('Honeymoon')?'brass':'sage'}">${phase.name}</span></div><p style="font-size:13.5px; font-weight:700; line-height:1.55; color:var(--text-mute); margin:10px 0 12px;">${phase.note}</p>${values.length ? sparkline(values) : `<div class="empty-state" style="text-align:center; padding:14px 0;"><span class="msg" style="font-weight:700; color:var(--text-mute);">毎日のステートを記録することで、ここに適応曲線トレンドがマッピングされます。</span></div>`}</div>
    <div class="section-label">${already ? "本日のチェックイン履歴" : "本日の精神的コンディション"}</div>
    <div class="card"><div class="mood-row" style="display:flex; gap:10px; justify-content:space-between; margin:8px 0 6px;">${MOODS.map(m => `<button class="mood-btn ${((already?already.mood:trackSelectedMood)===m.v)?'selected':''}" style="flex:1; aspect-ratio:1; border-radius:18px; border:2px solid var(--line); background:#fff; font-size:24px; cursor:pointer; transition: all 0.1s;" onclick="pickMood(${m.v})" ${already?'disabled':''}>${m.e}</button>`).join("")}</div>
      <div style="text-align:center; font-size:13px; font-weight:800; color:var(--text-mute); margin-bottom:14px;">${already ? MOODS.find(m=>m.v===already.mood).label : (trackSelectedMood ? MOODS.find(m=>m.v===trackSelectedMood).label : "現在の状態に最も近い指標を選択してください")}</div>
      ${already ? `${already.note ? `<p style="font-size:14px; font-weight:600; color:var(--text-main); background:var(--parchment-dim); padding:12px; border-radius:16px; margin:0;">${escapeHtml(already.note)}</p>` : ""}<div style="text-align:center; margin-top:8px;"><span class="chip">✓ 本日のログは記録済みです</span></div>` : `<textarea id="trackNote" placeholder="特記事項があれば入力してください（任意・空欄可）" rows="2"></textarea><div style="height:12px;"></div><button class="btn btn-brass btn-block" ${trackSelectedMood?'':'disabled'} onclick="saveCheckIn();">ステートを記録</button>`}</div>
    <div class="section-label">LOG HISTORY</div>
    ${STATE.tracker.length === 0 ? `<div class="empty-state"><span class="glyph">🧭</span><div class="msg">記録されたログは時系列データとしてここに蓄積されます。</div></div>` : `<div class="card" style="padding:8px 12px;">${STATE.tracker.slice().reverse().slice(0,20).map(e => `<div class="list-item"><div class="li-icon">${MOODS.find(m=>m.v===e.mood).e}</div><div class="li-body"><div class="li-title">${fmtDate(e.date)} ➔ ${MOODS.find(m=>m.v===e.mood).label}</div>${e.note ? `<div class="li-sub">${escapeHtml(e.note)}</div>` : ""}</div></div>`).join("")}</div>`}`;
}
function pickMood(v){ trackSelectedMood = v; renderTrack(); }
async function saveCheckIn(){ const note = document.getElementById("trackNote").value.trim(); STATE.tracker.push({ id:uid(), date: todayStr(), mood: trackSelectedMood, note }); trackSelectedMood = null; await storeSet("tracker-entries", STATE.tracker); renderTrack(); renderHome(); renderGrowth(); }

/* ================================ JOURNAL =================================== */
function renderJournal(){
  const el = document.getElementById("screen-journal");
  el.innerHTML = `<div class="card-row" style="margin-top:8px;"><div><div class="eyebrow">METAGOGNITIVE REFLECTION</div><div class="screen-title" style="margin-top:2px; font-size:24px;">気づきノート</div></div></div><div class="screen-sub">暗記ではなく内省を。出来事を記述し、自身の文化的レンズをメタ認知するエリアです。</div>
    <button class="btn btn-primary btn-block" onclick="openNewEntry();" style="margin-bottom:18px; display:flex; align-items:center; justify-content:center; gap:8px;">${icon('plus',18)} 新しい内省ログを作成</button>
    ${STATE.journal.length === 0 ? `<div class="empty-state" style="text-align:center; padding:34px 14px;"><span class="glyph" style="font-size:36px;">📓</span><div class="msg" style="font-weight:700; margin-top:8px;">内省のテーマを選択し、あなたの思考プロセスを客観的に記述してみましょう。</div></div>` : `<div class="section-label">REFLECTIONS</div><div class="card" style="padding:8px 12px;">${STATE.journal.slice().reverse().map(j => `<div class="list-item" onclick="viewEntry('${j.id}')" style="cursor:pointer;"><div class="li-icon">📝</div><div class="li-body"><div class="li-title">${fmtDate(j.date)}</div><div class="li-sub">${escapeHtml(j.text.slice(0,35))}${j.text.length>35?'…':''}</div></div>${icon('chevron',16)}</div>`).join("")}</div>`}`;
}
function openNewEntry(){
  const promptIdx = Math.floor(Math.random()*JOURNAL_PROMPTS.length);
  openModal(`<div class="sheet-handle"></div><button class="sheet-close" style="position:absolute; top:18px; right:18px; width:30px; height:30px; border-radius:50%; border:none; cursor:pointer; background:var(--parchment-dim); color:var(--text-mute);" onclick="closeModal();">✕</button>
    <div class="sheet-title" style="font-family:var(--display); font-weight:900; font-size:20px;">内省のテーマ</div>
    <div class="card" style="background:var(--parchment-dim); border:none; margin:12px 0 16px; box-shadow:none;"><p id="entryPromptText" style="font-size:14.5px; font-weight:700; margin:0; line-height:1.6; color:var(--text-main);">${escapeHtml(JOURNAL_PROMPTS[promptIdx])}</p>
      <button class="btn btn-ghost" style="margin-top:12px; font-size:12px; padding:6px 12px; box-shadow:none;" onclick="shufflePrompt();">🎲 別の問いに変更する</button></div>
    <textarea id="entryText" rows="6" placeholder="評価や正解はありません。自身の内面に生じた変化を客観的に記述してください。"></textarea><div style="height:14px;"></div><button class="btn btn-brass btn-block" onclick="saveEntry();">ノートに保存</button>`);
  document.getElementById("modalSheet").dataset.promptIdx = promptIdx;
}
function shufflePrompt(){ const sheet = document.getElementById("modalSheet"); let idx = Math.floor(Math.random()*JOURNAL_PROMPTS.length); sheet.dataset.promptIdx = idx; document.getElementById("entryPromptText").textContent = JOURNAL_PROMPTS[idx]; }
async function saveEntry(){ const text = document.getElementById("entryText").value.trim(); if (!text) return; const idx = parseInt(document.getElementById("modalSheet").dataset.promptIdx, 10); STATE.journal.push({ id: uid(), date: todayStr(), prompt: JOURNAL_PROMPTS[idx], text }); await storeSet("journal-entries", STATE.journal); closeModal(); renderJournal(); renderHome(); renderGrowth(); }
function viewEntry(id){
  const j = STATE.journal.find(e => e.id === id); if (!j) return;
  openModal(`<div class="sheet-handle"></div><button class="sheet-close" style="position:absolute; top:18px; right:18px; width:30px; height:30px; border-radius:50%; border:none; cursor:pointer; background:var(--parchment-dim); color:var(--text-mute);" onclick="closeModal();">✕</button>
    <div class="eyebrow">${fmtDateLong(j.date)}</div><div class="sheet-title" style="font-size:16px; margin-top:6px; font-weight:800; line-height:1.4;">${escapeHtml(j.prompt)}</div>
    <p style="font-size:14.5px; font-weight:600; line-height:1.65; white-space:pre-wrap; margin-top:14px; color:var(--text-main);">${escapeHtml(j.text)}</p>
    <button class="btn btn-ghost btn-block" style="margin-top:18px; color:var(--rust); border-color:var(--rust); box-shadow:none;" onclick="deleteEntry('${j.id}');">この記録を削除する</button>`);
}
async function deleteEntry(id){ STATE.journal = STATE.journal.filter(e => e.id !== id); await storeSet("journal-entries", STATE.journal); closeModal(); renderJournal(); renderHome(); renderGrowth(); }

/* ================================ GROWTH =================================== */
function renderGrowth(){
  const el = document.getElementById("screen-growth"); const today = todayStr(); const challengeIdx = dayOfYear(new Date()) % CHALLENGES.length; const daysActive = STATE.profile ? Math.max(1, Math.round((new Date(today) - new Date(STATE.profile.createdAt))/86400000)+1) : 1; const values = STATE.tracker.slice(-14).map(e=>e.mood);
  el.innerHTML = `<div class="eyebrow" style="margin-top:8px;">DMIS EVALUATION MODEL</div><div class="screen-title" style="margin-top:2px; font-size:24px;">発達段階の可視化</div><div class="screen-sub">ミルン・ベネットのDMISモデルに基づく異文化感受性の発達指標です。</div>
    <div class="card"><div class="dial-wrap">${compassDialSVG(STATE.dmis ? STATE.dmis.stageIndex : null, {size:190})}
        ${STATE.dmis ? `<div class="dial-stage-name" style="font-weight:900; font-size:20px; color:var(--ink-navy); margin-top:6px;">${DMIS_STAGES[STATE.dmis.stageIndex].name}</div><div class="dial-stage-group" style="font-weight:800; font-size:12px; color:var(--brass); margin-top:2px;">指標スコア: ${STATE.dmis.score} / 60</div><p style="font-size:13.5px; font-weight:700; color:var(--text-mute); line-height:1.6; margin:12px 4px 14px;">${DMIS_STAGES[STATE.dmis.stageIndex].blurb}</p>` : `<div class="dial-stage-name" style="font-weight:900; font-size:17px; margin-top:6px;">感受性レベル未測定</div><div class="dial-stage-group" style="color:var(--brass); font-weight:800; font-size:11px;">自己アセスメントを行い、現在の発達段階をマッピング</div><div style="height:12px;"></div>`}</div>
      <button class="btn ${STATE.dmis?'btn-ghost':'btn-brass'} btn-block" onclick="startQuiz();">${STATE.dmis ? 'アセスメントを再測定する' : '自己アセスメントを実施'}</button></div>
    <div class="section-label">LEVEL METRICS</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${daysActive}</div><span class="stat-label">経過日数</span></div>
      <div class="stat-box"><div class="stat-num">${STATE.challenges.streak}</div><span class="stat-label">連続ストリーク</span></div>
      <div class="stat-box"><div class="stat-num">${STATE.journal.length}</div><span class="stat-label">累積内省ログ</span></div>
      <div class="stat-box"><div class="stat-num">${Object.keys(STATE.challenges.completedDates).length}</div><span class="stat-label">完了ミッション</span></div>
    </div>
    ${values.length ? `<div class="section-label">MOOD TREND LINE</div><div class="card">${sparkline(values)}</div>` : ""}
    <div class="section-label">CHALLENGE POOL (デイリーでランダムに選択されます)</div>
    <div class="card" style="padding:8px 12px;">${CHALLENGES.map((c,i) => { const isToday = i === challengeIdx; const doneToday = isToday && !!STATE.challenges.completedDates[today]; return `<div class="list-item"><div class="li-icon" style="font-size:14px;">${doneToday ? '✅' : (isToday ? '📍' : '•')}</div><div class="li-body"><div class="li-title" style="${isToday?'font-weight:900; color:var(--ink-navy);':'color:var(--text-mute); font-weight:600;'}">${escapeHtml(c)}</div>${isToday ? `<div class="li-sub" style="color:var(--brass); font-weight:900;">本日のミッション</div>` : ""}</div></div>`; }).join("")}</div>
    <div class="section-label">UTILITIES</div>
    <div class="card" style="padding:8px 12px;">
      <div class="list-item" onclick="openTranslate();" style="cursor:pointer;"><div class="li-icon">🗣️</div><div class="li-body"><div class="li-title">ワンタップ翻訳ツール</div><div class="li-sub">日常の状況に即した簡易翻訳機能</div></div>${icon('chevron',16)}</div>
      <div class="list-item" onclick="openEditProfile();" style="cursor:pointer;"><div class="li-icon">⚙️</div><div class="li-body"><div class="li-title">対象文化の変更</div><div class="li-sub">現在値：${escapeHtml(STATE.profile.home)} ➔ ${escapeHtml(STATE.profile.host)}</div></div>${icon('chevron',16)}</div>
    </div>`;
}

let quizAnswers = []; let quizIndex = 0;
function startQuiz(){ quizAnswers = new Array(DMIS_QUESTIONS.length).fill(null); quizIndex = 0; renderQuiz(); }
function renderQuiz(){
  const total = DMIS_QUESTIONS.length; const pct = Math.round(((quizIndex)/total)*100);
  openModal(`<div class="sheet-handle"></div><button class="sheet-close" style="position:absolute; top:18px; right:18px; width:30px; height:30px; border-radius:50%; border:none; cursor:pointer; background:var(--parchment-dim); color:var(--text-mute);" onclick="closeModal();">✕</button>
    <div class="eyebrow">DMIS アセスメント · ${quizIndex+1} / ${total}</div><div class="quiz-progress" style="margin-top:12px;"><div class="quiz-progress-fill" style="width:${pct}%;"></div></div>
    <p style="font-size:18px; line-height:1.5; font-family:var(--display); font-weight:800; margin:4px 0 18px; color:var(--ink-navy);">${escapeHtml(DMIS_QUESTIONS[quizIndex])}</p>
    ${["全く当てはまらない","あまり当てはまらない","どちらとも言えない","概ね当てはまる","非常に当てはまる"].map((label,i)=>`<button class="quiz-opt" style="display:block; width:100%; text-align:left; background:#fff; border:2px solid var(--line); border-radius:16px; padding:14px; margin-bottom:10px; font-size:14.5px; font-weight:700; cursor:pointer;" onclick="answerQuiz(${i+1})">${label}</button>`).join("")}`);
}
function answerQuiz(val){ quizAnswers[quizIndex] = val; if (quizIndex < DMIS_QUESTIONS.length - 1){ quizIndex++; renderQuiz(); } else { finishQuiz(); } }
async function finishQuiz(){
  const total = quizAnswers.reduce((a,b)=>a+b,0); const stageIndex = scoreToStageIndex(total); STATE.dmis = { stageIndex, score: total, date: todayStr() }; await persistUserState(); const stage = DMIS_STAGES[stageIndex];
  openModal(`<div class="sheet-handle"></div>
    <div style="text-align:center; padding-top:6px;">${compassDialSVG(stageIndex, {size:190})}
      <div class="dial-stage-group" style="font-weight:800; color:var(--brass); font-size:12px; margin-top:12px;">診断カテゴリー：${stage.group}</div>
      <div class="dial-stage-name" style="font-size:22px; font-weight:900; color:var(--ink-navy); margin-top:2px;">${stage.name}</div>
      <p style="font-size:14px; font-weight:700; color:var(--text-mute); line-height:1.6; margin:12px 4px 20px;">${stage.blurb}</p>
      <button class="btn btn-primary btn-block" onclick="closeModal(); renderGrowth(); renderHome(); renderCoach(); switchTab('growth');">マイページで確認</button>
    </div>`);
}

const TRANSLATE_LANGS = ["English","Japanese","Spanish","French","German","Mandarin Chinese","Korean","Portuguese","Arabic","Hindi","Vietnamese","Thai","Russian","Italian"];
function openTranslate(){
  openModal(`<div class="sheet-handle"></div><button class="sheet-close" style="position:absolute; top:18px; right:18px; width:30px; height:30px; border-radius:50%; border:none; cursor:pointer; background:var(--parchment-dim); color:var(--text-mute);" onclick="closeModal();">✕</button>
    <div class="sheet-title" style="font-family:var(--display); font-weight:900; font-size:22px;">簡易翻訳ツール</div><p class="screen-sub" style="margin-bottom:16px;">日常で必要なフレーズを素早く翻訳します。</p>
    <div class="field"><label class="field-label">翻訳対象テキスト</label><textarea id="trText" rows="3" placeholder="フレーズを入力してください…"></textarea></div>
    <div class="field"><label class="field-label">変換言語</label><select id="trLang">${TRANSLATE_LANGS.map(l=>`<option value="${l}">${l}</option>`).join("")}</select></div>
    <button class="btn btn-brass btn-block" onclick="runTranslate();">翻訳を実行</button><div id="trResult"></div>`);
}
async function runTranslate(){
  const text = document.getElementById("trText").value.trim(); const lang = document.getElementById("trLang").value; const resultEl = document.getElementById("trResult"); if (!text){ return; }
  resultEl.innerHTML = `<p style="margin-top:14px; font-size:13.5px; font-weight:700; color:var(--text-mute);">翻訳中...</p>`;
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 300, system: `You are a translation tool. Translate the user's text into ${lang}. Respond with ONLY the translation and nothing else — no notes, no quotation marks, no explanation.`, messages: [{ role:"user", content: text }] }) });
    const data = await response.json(); const out = (data.content||[]).map(b=>b.text||"").join("").trim();
    resultEl.innerHTML = `<div class="card" style="background:var(--parchment-dim); border:none; margin-top:14px; box-shadow:none;"><div class="eyebrow" style="margin-bottom:6px;">${lang.toUpperCase()}</div><p style="font-size:15.5px; font-weight:800; margin:0; line-height:1.55; color:var(--ink-navy);">${escapeHtml(out || "翻訳処理に失敗しました。")}</p></div>`;
  }catch(e){
    resultEl.innerHTML = `<p style="margin-top:14px; font-size:13.5px; font-weight:700; color:var(--rust);">通信に失敗しました。再度お試しください。</p>`;
  }
}

boot();
</script>
</body>
</html>
