<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CultureCompass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-navy:#12233F;
    --midnight:#0B1626;
    --brass:#C89B3C;
    --brass-light:#E4C878;
    --parchment:#F7F2E7;
    --parchment-dim:#EFE7D3;
    --sage:#6E8B74;
    --rust:#B5533C;
    --text-main:#1F2A3C;
    --text-mute:#5B6B82;
    --line:#DCD3BC;

    --display:'Nunito', sans-serif;
    --body:'Nunito', sans-serif;
    --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--body);
    color:var(--text-main);
    background:var(--midnight);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    margin:0;
    overflow:hidden;
  }

  /* ---------- phone shell ---------- */
  .phone{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    padding-top: env(safe-area-inset-top, 20px);
    padding-bottom: env(safe-area-inset-bottom, 20px);
    background:var(--parchment);
  }
  .statusbar{
    display: none !important;
  }

  /* ---------- app body / screens ---------- */
  .app-body{
    flex:1 1 auto;
    position:relative;
    overflow:hidden;
    background:var(--parchment);
  }
  .screen{
    position:absolute;
    inset:0;
    overflow-y:auto;
    padding:16px 20px 32px;
    opacity:0;
    visibility:hidden;
    transform:translateY(6px);
    transition:opacity 0.22s ease, transform 0.22s ease;
    scrollbar-width:none;
  }
  .screen::-webkit-scrollbar{display:none;}
  .screen.active{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
    z-index:10;
  }

  #screen-coach {
    display: flex !important;
    flex-direction: column !important;
    padding-bottom: 0 !important;
    overflow: hidden !important;
  }

  .screen-title{
    font-family:var(--display);
    font-weight:900;
    font-size:28px;
    letter-spacing:-0.01em;
    margin:10px 0 2px;
    color:var(--ink-navy);
  }
  .screen-sub{
    font-family:var(--body);
    font-weight:700;
    font-size:14px;
    color:var(--text-mute);
    margin:0 0 18px;
    line-height:1.4;
  }
  .eyebrow{
    font-family:var(--display);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--brass);
    font-weight:900;
  }

  /* ---------- card ---------- */
  .card{
    background:#fff;
    border:2px solid var(--line);
    border-radius:24px;
    padding:20px;
    margin-bottom:16px;
    box-shadow: 0 2px 4px rgba(18, 35, 63, 0.03);
  }
  .card-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}

  /* ---------- 3D buttons ---------- */
  button{font-family:var(--body);}
  .btn{
    appearance:none;
    border:none;
    border-radius:20px;
    padding:15px 22px;
    font-family:var(--body);
    font-weight:800;
    font-size:16px;
    cursor:pointer;
    position:relative;
    transition: all 0.1s ease;
  }
  .btn-primary {
    background: var(--ink-navy);
    color: var(--parchment);
    box-shadow: 0 4px 0 #0b1626;
  }
  .btn-primary:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 #0b1626;
  }
  .btn-brass {
    background: var(--brass);
    color: var(--midnight);
    box-shadow: 0 4px 0 #96732b;
  }
  .btn-brass:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 #96732b;
  }
  .btn-ghost {
    background: #fff;
    color: var(--ink-navy);
    border: 2px solid var(--line);
    box-shadow: 0 4px 0 var(--line);
  }
  .btn-ghost:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 var(--line);
  }
  .btn-block{width:100%;}
  .btn:disabled{opacity:0.45; cursor:not-allowed; transform:none !important; box-shadow:none !important;}

  /* ---------- tab bar ---------- */
  .tabbar{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-around;
    padding:12px 6px 32px;
    background:#fff;
    border-top:2px solid var(--line);
    z-index:60;
  }
  .tab{
    background:none; border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--text-mute);
    font-family:var(--display);
    font-weight:800;
    font-size:11px;
    padding:4px 8px;
    border-radius:12px;
    transition:color 0.15s ease;
  }
  .tab svg{width:22px; height:22px; stroke:var(--text-mute); stroke-width:2.2; transition:stroke 0.15s ease;}
  .tabbar .tab.active{color:var(--ink-navy) !important;}
  .tabbar .tab.active svg{stroke:var(--brass) !important; fill: rgba(200,155,60,0.1) !important;}

  /* ---------- onboarding overlay ---------- */
  .overlay{
    position:absolute; inset:0; z-index:200;
    background:var(--ink-navy);
    display:flex; flex-direction:column;
    padding:44px 26px 32px;
    color:var(--parchment);
    opacity:1; visibility:visible;
    transition:opacity 0.25s ease, visibility 0.25s ease;
  }
  .overlay.hidden{opacity:0; visibility:hidden; pointer-events:none;}
  .overlay-scroll{flex:1 1 auto; overflow-y:auto; scrollbar-width:none;}
  .overlay-scroll::-webkit-scrollbar{display:none;}

  select, input[type=text], textarea{
    width:100%;
    font-family:var(--body);
    font-weight:700;
    font-size:15px;
    padding:14px;
    border-radius:16px;
    border:2px solid var(--line);
    background:#fff;
    color:var(--text-main);
    outline:none;
  }
  select:focus, input[type=text]:focus, textarea:focus{border-color:var(--brass);}
  label.field-label{
    display:block;
    font-family:var(--display);
    font-weight:800;
    font-size:12px;
    text-transform:uppercase;
    color:var(--text-mute);
    margin:0 0 8px;
  }
  .field{margin-bottom:20px;}

  .overlay select, .overlay input[type=text]{
    background:rgba(255,255,255,0.06);
    border-color:rgba(255,255,255,0.18);
    color:var(--parchment);
  }
  .overlay select option{color:#000;}
  .overlay label.field-label{color:rgba(247,242,231,0.55);}

  ::placeholder{color:#B9B0A0;}

  /* ---------- modal sheet ---------- */
  .modal-overlay{
    position:absolute; inset:0; z-index:300;
    background:rgba(11,22,38,0.5);
    opacity:0; visibility:hidden;
    transition:opacity 0.2s ease, visibility 0.2s ease;
    display:flex; align-items:flex-end;
  }
  .modal-overlay.open{opacity:1; visibility:visible;}
  .modal-sheet{
    width:100%;
    max-height:88%;
    background:var(--parchment);
    border-radius:32px 32px 0 0;
    padding:24px 20px 36px;
    overflow-y:auto;
    transform:translateY(100%);
    transition:transform 0.28s cubic-bezier(.32,.72,0,1);
    scrollbar-width:none;
  }
  .modal-sheet::-webkit-scrollbar{display:none;}
  .modal-overlay.open .modal-sheet{transform:translateY(0);}
  .sheet-handle{
    width:40px; height:6px; border-radius:3px;
    background:var(--line); margin:2px auto 18px;
  }

  .sheet-close {
    width:40px !important;
    height:40px !important;
    border-radius:50% !important;
    background:var(--parchment-dim);
    border:none;
    cursor:pointer;
    display:inline-flex !important;
    align-items:center !important;
    justify-content:center !important;
    color:var(--text-mute);
    padding:0 !important;
    margin:0;
  }
  .sheet-close svg, .btn-ghost svg {
    display:block;
  }

  .dial-wrap{ 
    text-align:center !important; 
    padding:6px 0 2px; 
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .needle{ 
    transition: transform 1s cubic-bezier(.22,1,.36,1); 
  }

  .chat-scroll {
    flex: 1 1 auto !important;
    overflow-y: auto !important;
    scrollbar-width: none;
    padding-bottom: 90px !important;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chat-scroll::-webkit-scrollbar { display: none; }

  .chat-inputbar{
    position: absolute !important;
    bottom: 0 !important;
    left: 0 !important;
    width: 100% !important;
    display: flex;
    gap: 8px;
    align-items: center;
    background: var(--parchment);
    padding: 12px 20px 16px 20px;
    border-top: 2px solid var(--line);
    z-index: 50;
  }
  .chat-inputbar textarea{
    resize: none;
    max-height: 46px;
    min-height: 46px;
    font-size: 14.5px;
    padding: 12px 14px;
    border-radius: 24px;
  }

  /* ---------- ダミースキャン画面 ---------- */
  .camera-view {
    width: 100%;
    height: 240px;
    background: #111;
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    border: 2px solid var(--ink-navy);
  }
  .scan-frame {
    width: 140px;
    height: 140px;
    border: 3px solid var(--brass);
    border-radius: 16px;
    position: relative;
    box-shadow: 0 0 0 999px rgba(0,0,0,0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { opacity: 0.7; }
    50% { opacity: 1; }
    100% { opacity: 0.7; }
  }

  /* ---------- misc UI atoms ---------- */
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--display); font-weight:800; font-size:11px;
    padding:6px 12px; border-radius:14px;
    background:var(--parchment-dim); color:var(--text-mute);
  }
  .chip.brass{background:rgba(200,155,60,0.14); color:#8a6a1f;}
  .chip.sage{background:rgba(110,139,116,0.16); color:#2f4734;}
  .chip.rust{background:rgba(181,83,60,0.12); color:var(--rust);}

  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .stat-box{
    background:#fff; border:2px solid var(--line); border-radius:20px;
    padding:16px;
  }
  .stat-num{font-family:var(--display); font-weight:900; font-size:26px; color:var(--ink-navy); line-height:1;}
  .stat-label{font-family:var(--display); font-weight:800; font-size:11px; text-transform:uppercase; color:var(--text-mute); margin-top:6px; display:block;}

  .section-label{
    font-family:var(--display); font-weight:900; font-size:13px; letter-spacing:0.03em; text-transform:uppercase;
    color:var(--text-mute); margin:24px 0 12px; display:flex; align-items:center; justify-content:space-between;
  }

  .list-item{
    display:flex; align-items:center; gap:14px;
    padding:14px 4px; border-bottom:2px solid var(--line);
  }
  .list-item:last-child{border-bottom:none;}
  .li-icon{
    width:38px; height:38px; border-radius:12px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    background:var(--parchment-dim); font-size:18px;
  }
  .li-body{flex:1 1 auto; min-width:0;}
  .li-title{font-weight:800; font-size:14.5px; color:var(--text-main);}
  .li-sub{font-weight:600; font-size:12.5px; color:var(--text-mute); margin-top:2px;}

  .quiz-progress{height:12px; border-radius:10px; background:var(--parchment-dim); overflow:hidden; margin-bottom:20px; border: 2px solid var(--line);}
  .quiz-progress-fill{height:100%; background:var(--brass); border-radius:8px; transition:width 0.25s ease;}

  /* chat */
  .bubble{max-width:82%; padding:12px 16px; border-radius:20px; font-size:14.5px; line-height:1.5; font-weight:600;}
  .bubble.user{align-self:flex-end; background:var(--ink-navy); color:var(--parchment); border-bottom-right-radius:4px;}
  .bubble.ai{align-self:flex-start; background:#fff; border:2px solid var(--line); color:var(--text-main); border-bottom-left-radius:4px;}
</style>
</head>

<div class="phone">

    <div class="overlay" id="onboarding">
      <div class="overlay-scroll" id="onboardingScroll"></div>
      <div id="onboardingFooter"></div>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-sheet" id="modalSheet"></div>

    <!-- ================= SCREENS ================= -->
    <div class="screen active" id="screen-home"></div>

  <div class="tabbar" id="tabbar"></div>
</div>

<script>
const memoryStore = {};
async function storeGet(key){
  try{
    if (window.storage && window.storage.get){
      const r = await window.storage.get(key, false);
      return r ? JSON.parse(r.value) : null;
    }
  }catch(e){}
  return memoryStore.hasOwnProperty(key) ? memoryStore[key] : null;
}
/* storeSetの無限再帰バグを修正 (引数を3つにしてwindow.storage.setと差別化) */
async function storeSet(key, value){
  memoryStore[key] = value;
  try{
    if (window.storage && window.storage.set){
      await window.storage.set(key, JSON.stringify(value), false);
    }
  }catch(e){}
}

const COUNTRIES = ["Japan","United States","China","South Korea","India","Vietnam","Indonesia","Philippines","Thailand","Taiwan","United Kingdom","Germany","France","Italy","Spain","Netherlands","Sweden","Poland","Russia","Turkey","Brazil","Mexico","Argentina","Canada","Australia","New Zealand","Nigeria","Kenya","South Africa","Egypt","Saudi Arabia","United Arab Emirates","Iran","Israel"];

const DMIS_STAGES = [
  { name:"Denial", group:"Ethnocentric", color:"var(--rust)", blurb:"Cultural difference isn't fully registered yet — one's own way of doing things feels like simply 'how things are'." },
  { name:"Defense", group:"Ethnocentric", color:"var(--rust)", blurb:"Difference is noticed but experienced as a threat, often leading to 'us vs. them' thinking or an assumption of cultural superiority." },
  { name:"Minimization", group:"Ethnocentric", color:"var(--brass)", blurb:"Surface differences are visible, but deep down there is a strong insistence that 'we are all the same,' which can flatten critical cultural nuances." },
  { name:"Acceptance", group:"Ethnorelative", color:"var(--sage)", blurb:"Other cultures are recognized as genuinely different and equally legitimate ways of organizing reality — not better or worse, just different." },
  { name:"Adaptation", group:"Ethnorelative", color:"var(--sage)", blurb:"You can consciously shift perspective and communication styles to interact effectively, seeing situations through more than one cultural lens." },
  { name:"Integration", group:"Ethnorelative", color:"var(--sage)", blurb:"Cultural frames become fluid parts of identity — you move between them naturally, depending on context." }
];

const DMIS_QUESTIONS = [
  "When something a host-culture person does confuses me, my first instinct is to ask what it means to them, not to assume it's wrong.",
  "I can usually explain a cultural custom I dislike in terms that make sense from inside that culture, not just from my own perspective.",
  "I notice when I'm judging another culture using my own culture's rules as the only standard.",
  "I'm comfortable admitting that my own culture's way of doing something isn't the only reasonable way.",
  "When I feel frustrated by cultural difference, I can usually name what specifically triggered that reaction.",
  "I can adjust how I communicate (directness, formality, silence) depending on who I'm speaking with.",
  "I don't assume that people who are polite, quiet, or direct in one culture are behaving purely out of individual personality traits.",

  "I can hold two different cultural perspectives on the same situation without needing to pick a 'correct' one.",
  "I've changed a habit or assumption of mine after understanding it better through another culture's eyes.",
  "I notice cultural influences on my own behavior, not just on other people's.",
  "I feel reasonably steady and self-contained, not just tolerant, when I'm the obvious cultural outsider in a room."
];

const MOODS = [
  { v:1, e:"😫", label:"Overwhelmed" },
  { v:2, e:"😕", label:"Slightly Uneasy" },
  { v:3, e:"😐", label:"Neutral / Flat" },
  { v:4, e:"🙂", label:"Settling In" },
  { v:5, e:"🥳", label:"Thriving!" }
];

const CHALLENGES = [
  "Ask someone from your host culture to explain a custom you don't fully understand — completely without judging it.",
  "Notice one specific moment today you felt like an outsider. Write one objective sentence about what triggered it.",
  "Try a greeting, phrase, or gesture from your host culture that you haven't personally used before.",
  "Identify one assumption you are making about someone around you today, and check whether it is cultural or just personal.",
  "Ask a local how they typically handle a minor disagreement with a friend. Compare it to your home approach.",
  "Pay attention to how silence is used in a conversation today. Is it comfortable, awkward, or a sign of respect?",
  "Eat a meal exactly the way it is typically eaten in your host culture, from start to finish.",
  "Notice how directly or indirectly people give feedback around you today. Spot one concrete example.",
  "Ask a local about a holiday or tradition from their culture that genuinely matters to them personally.",
  "Notice one thing about personal space, eye contact, or touch that differs from what feels 'normal' to you.",
  "Try explaining a common custom from your home culture to a local as if they had never heard of it before.",
  "Identify a local word or phrase that doesn't translate neatly into your language. Ask why that concept exists.",
  "Observe how people show respect to authority or elders today, and compare it directly to your home culture.",
  "Reflect on one moment this week where you handled a cultural difference smoothly and feel proud of your response."
];

const JOURNAL_PROMPTS = [
  "Describe a moment today when you noticed a cultural difference. How did you interpret it initially?",
  "What implicit assumption did you catch yourself making today, and where do you think it originates?",
  "Recall an interaction that felt confusing. What might explain it logically from the other person's cultural frame?",
  "What is something from your home culture that you are starting to view differently since arriving here?",
  "Write about a small cross-cultural win — a moment where an interaction went more smoothly than expected.",
  "What feels genuinely difficult right now? No need to solve it immediately, just frame it honestly.",

  "Free write — anything currently on your mind regarding your cultural adjustment process."

/* コーチ画面用のクイックプロンプト配列をここで確実に定義 */
const QUICK_PROMPTS = [
  "Why might locals avoid direct eye contact during conversations?",
  "How can I structurally prepare for a disagreement here?",
  "What constitutes appropriate small talk boundaries in this culture?",
  "How should I navigate transitional fatigue or homesickness safely?"
];

const ICONS = {
  home: '<path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H10v-5.5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1V20h3.5a1 1 0 0 0 1-1v-9"/>',
  coach: '<path d="M4 5.5A2.5 2.5 0 0 1 6.5 3h11A2.5 2.5 0 0 1 20 5.5v8A2.5 2.5 0 0 1 17.5 16H10l-4.5 4v-4H6.5A2.5 2.5 0 0 1 4 13.5z"/>',

  send: '<path d="M4 12 20 4 13 20l-2-7z"/><path d="M4 12l7 1"/>',

function icon(name, size){ return `<svg viewBox="0 0 24 24" width="${size||22}" height="${size||22}" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]}</svg>`; }

const TABS = [{ id:"home", label:"Home", icon:"home" }, { id:"coach", label:"Coach", icon:"coach" }, { id:"track", label:"Track", icon:"track" }, { id:"journal", label:"Journal", icon:"journal" }, { id:"growth", label:"Growth", icon:"growth" }];

let STATE = { profile: null, dmis: null, tracker: [], journal: [], challenges: { completedDates:{}, streak:0, lastDate:null }, coachHistory: [] };
let activeTab = "home"; let onboardingStep = 0; let onboardingDraft = { name:"", home:"", host:"" };

function todayStr(d){ const dt = d || new Date(); return dt.toISOString().slice(0,10); }
function fmtDate(iso){ const d = new Date(iso + "T00:00:00"); return d.toLocaleDateString(undefined, { month:"short", day:"numeric" }); }
function fmtDateLong(iso){ const d = new Date(iso + "T00:00:00"); return d.toLocaleDateString(undefined, { weekday:"long", month:"long", day:"numeric" }); }
function dayOfYear(d){ const start = new Date(d.getFullYear(), 0, 0); const diff = d - start; return Math.floor(diff / 86400000); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function greetingWord(){ const h = new Date().getHours(); if (h < 12) return "GOOD MORNING"; if (h < 18) return "GOOD AFTERNOON"; return "GOOD EVENING"; }

function compassDialSVG(stageIndex, opts){
  opts = opts || {}; const size = opts.size || 220; const known = stageIndex !== null && stageIndex !== undefined; const idx = known ? stageIndex : 0; const cx = 100, cy = 108, r = 78; const segAngle = 180/6; let arcs = "";
  for (let i=0;i<6;i++){
    const a0 = -90 + i*segAngle; const a1 = -90 + (i+1)*segAngle - 2; const p0 = polar(cx,cy,r,a0), p1 = polar(cx,cy,r,a1); const stage = DMIS_STAGES[i]; const dim = known && i !== idx; const col = known ? (i===idx ? stage.color : "var(--line)") : "var(--line)";
    arcs += `<path d="M ${p0.x} ${p0.y} A ${r} ${r} 0 0 1 ${p1.x} ${p1.y}" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round" opacity="${dim?0.4:1}"/>`;
  }
  const needleAngle = known ? (-90 + segAngle*idx + segAngle/2) : -90 + segAngle/2;
  return `<svg viewBox="0 0 200 140" width="${size}" height="${size*0.7}">${arcs}<circle cx="${cx}" cy="${cy}" r="7" fill="var(--ink-navy)"/><path class="needle" d="M ${cx} ${cy-58} L ${cx-4} ${cy} L ${cx+4} ${cy} Z" fill="var(--brass)" transform="rotate(${needleAngle+90}, ${cx}, ${cy})"/></svg>`;
}
function polar(cx,cy,r,angleDeg){ const a = (angleDeg-90) * Math.PI/180; return { x: cx + r*Math.cos(a), y: cy + r*Math.sin(a) }; }

function sparkline(values, opts){
  opts = opts || {}; const w = opts.w || 320, h = opts.h || 64, pad = 8; if (!values.length) return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}"></svg>`; const min = 1, max = 5; const stepX = values.length > 1 ? (w - pad*2)/(values.length-1) : 0;
  const pts = values.map((v,i)=>{ const x = pad + stepX*i; const y = h - pad - ((v-min)/(max-min))*(h-pad*2); return [x,y]; });
  const path = pts.map((p,i)=> (i===0?"M":"L")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const dots = pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="var(--brass)"/>`).join("");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none"><path d="${path}" fill="none" stroke="var(--brass)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;
}

function classifyPhase(entries){
  if (entries.length < 3) return { name:"Honeymoon Phase", note:"Everything feels fresh, engaging, and novel. Cultural adaptation fatigue typically emerges slightly later in the journey." };
  const recent = entries.slice(-5).map(e=>e.mood); const avg = recent.reduce((a,b)=>a+b,0)/recent.length;
  if (avg < 2.5) return { name:"Culture Shock Phase", note:"Frustrations with host habits or mental fatigue are prominent. This is a vital sign of cognitive growth as your mind adapts to alternative logic." };
  if (avg < 3.6) return { name:"Adjustment Phase", note:"You are steadily decoding unwritten social rules and establishing functional everyday routines in your host environment." };
  return { name:"Acceptance Phase", note:"You are successfully holding both cultural frames, operating comfortably and authentically without constant friction." };
}

async function boot(){
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('v') === 'clear') {
    await Promise.all([storeSet("user-state", null), storeSet("tracker-entries", []), storeSet("journal-entries", []), storeSet("challenges-state", null), storeSet("coach-history", [])]);
    window.location.href = window.location.pathname; 
    return;
  }

  const [userState, tracker, journal, challenges, coachHistory] = await Promise.all([storeGet("user-state"), storeGet("tracker-entries"), storeGet("journal-entries"), storeGet("challenges-state"), storeGet("coach-history")]);
  if (userState){ STATE.profile = userState.profile || null; STATE.dmis = userState.dmis || null; }
  STATE.tracker = tracker || []; STATE.journal = journal || []; STATE.challenges = challenges || { completedDates:{}, streak:0, lastDate:null }; STATE.coachHistory = coachHistory || [];
  
  buildTabBar();
  
  if (!STATE.profile){ 
    onboardingStep = 0; 
    renderOnboarding(); 
  } else { 
    document.getElementById("onboarding").classList.add("hidden"); 
    renderAll(); 
  }
}
async function persistUserState(){ await storeSet("user-state", { profile: STATE.profile, dmis: STATE.dmis }); }
function renderAll(){ renderHome(); renderCoach(); renderTrack(); renderJournal(); renderGrowth(); }

function buildTabBar(){
  const bar = document.getElementById("tabbar");
  bar.innerHTML = TABS.map(t => `<button class="tab" id="tab-${t.id}" onclick="switchTab('${t.id}')">${icon(t.icon,22)}<span>${t.label}</span></button>`).join("");
  const currentTabButton = document.getElementById("tab-" + activeTab);
  if (currentTabButton) currentTabButton.classList.add("active");
}

function switchTab(id){
  activeTab = id; 
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active")); 
  const targetScreen = document.getElementById("screen-"+id);
  if (targetScreen) targetScreen.classList.add("active");
  
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  const targetTab = document.getElementById("tab-" + id);
  if (targetTab) targetTab.classList.add("active");
  
  if (id==="coach") scrollChatToBottom();
}

function countryOptions(selected){ return `<option value="" disabled ${!selected?'selected':''}>Choose a country/culture…</option>` + COUNTRIES.map(c=>`<option value="${c}" ${c===selected?'selected':''}>${c}</option>`).join(""); }

          Navigate new cultures. Understand the unwritten rules.
        </p>
      </div>`;
    footerHtml = `<button class="btn btn-brass btn-block" onclick="onboardingStep=1; renderOnboarding();">Get Started</button>`;
  }

    footerHtml = `<div style="display:flex; gap:10px; width:100%"><button class="btn btn-ghost" style="flex:1" onclick="onboardingStep=0; renderOnboarding();">Back</button><button class="btn btn-brass" style="flex:2" onclick="obSaveName();">Continue</button></div>`;
  }

      <p style="font-size:14px; color:rgba(247,242,231,0.7); margin:0 0 16px;">The baseline culture you grew up in or identify with most closely.</p>
      <div class="field"><label class="field-label">Home Culture</label><select id="ob-home">${countryOptions(onboardingDraft.home)}</select></div>`;
    footerHtml = `<div style="display:flex; gap:10px; width:100%"><button class="btn btn-ghost" style="flex:1" onclick="onboardingStep=1; renderOnboarding();">Back</button><button class="btn btn-brass" style="flex:2" onclick="obSaveHome();">Continue</button></div>`;
  }
  else if (onboardingStep === 3){
    body = `<div class="eyebrow" style="color:var(--brass-light);">STEP 3 / 4</div>
      <h2 style="font-family:var(--display); font-size:24px; font-weight:900; margin:8px 0 6px;">Which culture are you navigating?</h2>
      <p style="font-size:14px; color:rgba(247,242,231,0.7); margin:0 0 16px;">The host destination where you are currently studying, working, or living.</p>
      <div class="field"><label class="field-label">Host Culture</label><select id="ob-host">${countryOptions(onboardingDraft.host)}</select></div>`;
    footerHtml = `<div style="display:flex; gap:10px; width:100%"><button class="btn btn-ghost" style="flex:1" onclick="onboardingStep=2; declineOnboarding();">Back</button><button class="btn btn-brass" style="flex:2" onclick="obSaveHost();">Continue</button></div>`;
  }
  else if (onboardingStep === 4){
    body = `<div class="eyebrow" style="color:var(--brass-light);">STEP 4 / 4</div>
      <h2 style="font-family:var(--display); font-size:24px; font-weight:900; margin:8px 0 18px;">You're all set, ${escapeHtml(onboardingDraft.name)}</h2>
      <div class="card" style="background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.16); box-shadow:none;">
        <div class="card-row"><span class="chip" style="background:rgba(255,255,255,0.1); color:var(--parchment);">HOME</span><strong style="color:var(--parchment);">${escapeHtml(onboardingDraft.home)}</strong></div>
        <div style="height:10px;"></div>
        <div class="card-row"><span class="chip" style="background:rgba(255,255,255,0.1); color:var(--parchment);">HOST</span><strong style="color:var(--parchment);">${escapeHtml(onboardingDraft.host)}</strong></div>
      </div>
      <p style="font-size:14px; line-height:1.6; color:rgba(247,242,231,0.7); margin-top:16px;">
        Your AI cultural analyst is calibrated. You can take the 2-minute developmental self-assessment from the Growth tab at any time to map your baseline sensitivity.
      </p>`;
    footerHtml = `<button class="btn btn-brass btn-block" onclick="finishOnboarding();">Enter CultureCompass</button>`;
  }
  scroll.innerHTML = body; footer.innerHTML = footerHtml;
}

function obSaveName(){ onboardingDraft.name = document.getElementById("ob-name").value.trim() || "Traveler"; onboardingStep = 2; renderOnboarding(); }
function obSaveHome(){ const v = document.getElementById("ob-home").value; if (!v) return; onboardingDraft.home = v; onboardingStep = 3; renderOnboarding(); }
function obSaveHost(){ const v = document.getElementById("ob-host").value; if (!v) return; onboardingDraft.host = v; onboardingStep = 4; renderOnboarding(); }
async function finishOnboarding(){ STATE.profile = { name: onboardingDraft.name, home: onboardingDraft.home, host: onboardingDraft.host, createdAt: todayStr() }; await persistUserState(); document.getElementById("onboarding").classList.add("hidden"); renderAll(); }

async function saveEditProfile(){ STATE.profile.name = document.getElementById("ep-name").value.trim() || STATE.profile.name; STATE.profile.home = document.getElementById("ep-home").value; STATE.profile.host = document.getElementById("ep-host").value; await persistUserState(); closeModal(); renderAll(); }

async function resetApp(){
  if(confirm("Reset entire local database session?")){
    await Promise.all([storeSet("user-state", null), storeSet("tracker-entries", []), storeSet("journal-entries", []), storeSet("challenges-state", null), storeSet("coach-history", [])]);
    window.location.reload();
  }
}

async function toggleChallenge(dateStr){
  const c = STATE.challenges;
  if (c.completedDates[dateStr]){ delete c.completedDates[dateStr]; } else { c.completedDates[dateStr] = true; let streak = 0; let d = new Date(dateStr + "T00:00:00"); while (c.completedDates[todayStr(d)]){ streak++; d.setDate(d.getDate()-1); } c.streak = streak; c.lastDate = dateStr; }
  await storeSet("challenges-state", c); renderHome(); renderGrowth();
}
