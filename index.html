<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CultureCompass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-navy:#12233F;
    --midnight:#0B1626;
    --brass:#C89B3C;
    --brass-light:#E4C878;
    --parchment:#F7F2E7;
    --parchment-dim:#EFE7D3;
    --sage:#6E8B74;
    --rust:#B5533C;
    --text-main:#1F2A3C;
    --text-mute:#5B6B82;
    --line:#DCD3BC;

    --display:'Fraunces', serif;
    --body:'Work Sans', sans-serif;
    --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
body{
    font-family:var(--body);
    color:var(--text-main);
    background: var(--midnight); /* 外側の余白は暗い色にしておきます */
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 0;
    overflow-x:hidden;
  }

  /* ---------- backdrop flourish : faint compass rose lines ---------- */
  .backdrop-mark{
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:0.05;
    background-image:
      repeating-conic-gradient(from 0deg, var(--brass-light) 0deg 0.6deg, transparent 0.6deg 30deg);
    mask-image: radial-gradient(circle at 50% 50%, black 0%, transparent 70%);
  }

/* ---------- phone shell ---------- */
  .phone{
    position:relative;
    width:100vw;
    /* 画面の100%から、上の余白44px分を最初から引き算します */
    height: calc(100vh - 44px);
    background: var(--parchment); /* 最上部をクリーム色にする */[cite: 1]
    overflow:hidden;
    display:flex;
    flex-direction:column;
    /* iPhoneのステータスバーを避ける安全な余白 */
    padding-top: 44px; 
    /* 下にズレるのを防ぐため、位置を最上部に固定 */
    top: 0;
  }
  .notch{
    display: none; /* これを追加してスマホの偽ノッチを消します */
    position:absolute;
    position:absolute;
    top:10px; left:50%;
    transform:translateX(-50%);
    width:120px; height:26px;
    background:var(--midnight);
    border-radius:20px;
    z-index:50;
  }
.statusbar{
    display: none !important;
  }

  /* ---------- app body / screens ---------- */
  .app-body{
    flex:1 1 auto;
    position:relative;
    overflow:hidden;
    background:var(--parchment);
  }
  .screen{
    position:absolute;
    inset:0;
    overflow-y:auto;
    padding:6px 20px 24px;
    opacity:0;
    visibility:hidden;
    transform:translateY(6px);
    transition:opacity 0.22s ease, transform 0.22s ease;
    scrollbar-width:none;
  }
  .screen::-webkit-scrollbar{display:none;}
  .screen.active{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
    z-index:10;
  }

  .screen-title{
    font-family:var(--display);
    font-weight:600;
    font-size:28px;
    letter-spacing:-0.01em;
    margin:10px 0 2px;
    color:var(--ink-navy);
  }
  .screen-sub{
    font-family:var(--body);
    font-size:13.5px;
    color:var(--text-mute);
    margin:0 0 18px;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--brass);
    font-weight:500;
  }

  /* ---------- card ---------- */
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:20px;
    padding:18px;
    margin-bottom:14px;
    box-shadow:0 1px 0 rgba(0,0,0,0.02);
  }
  .card-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}

  button{font-family:var(--body);}
  .btn{
    appearance:none;
    border:none;
    border-radius:14px;
    padding:13px 18px;
    font-family:var(--body);
    font-weight:600;
    font-size:14.5px;
    cursor:pointer;
    transition:transform 0.12s ease, opacity 0.12s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--ink-navy); color:var(--parchment);}
  .btn-brass{background:var(--brass); color:var(--midnight);}
  .btn-ghost{background:transparent; color:var(--ink-navy); border:1.5px solid var(--line);}
  .btn-block{width:100%;}
  .btn:disabled{opacity:0.45; cursor:not-allowed;}

  /* ---------- tab bar ---------- */
  .tabbar{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-around;
    padding:8px 6px 14px;
    background:rgba(247,242,231,0.92);
    backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    z-index:60;
  }
  .tab{
    background:none; border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color:var(--text-mute);
    font-family:var(--mono);
    font-size:9.5px;
    letter-spacing:0.03em;
    padding:4px 8px;
    border-radius:10px;
    transition:color 0.15s ease;
  }
  .tab svg{width:22px; height:22px; stroke:var(--text-mute); transition:stroke 0.15s ease;}
  .tab.active{color:var(--ink-navy);}
  .tab.active svg{stroke:var(--brass);}

  /* ---------- onboarding overlay ---------- */
  .overlay{
    position:absolute; inset:0; z-index:200;
    background:var(--ink-navy);
    display:flex; flex-direction:column;
    padding:38px 26px 26px;
    color:var(--parchment);
    opacity:1; visibility:visible;
    transition:opacity 0.25s ease, visibility 0.25s ease;
  }
  .overlay.hidden{opacity:0; visibility:hidden; pointer-events:none;}
  .overlay-scroll{flex:1 1 auto; overflow-y:auto; scrollbar-width:none;}
  .overlay-scroll::-webkit-scrollbar{display:none;}

  select, input[type=text], textarea{
    width:100%;
    font-family:var(--body);
    font-size:14.5px;
    padding:12px 14px;
    border-radius:12px;
    border:1.5px solid var(--line);
    background:#fff;
    color:var(--text-main);
    outline:none;
  }
  select:focus, input[type=text]:focus, textarea:focus{border-color:var(--brass);}
  label.field-label{
    display:block;
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--text-mute);
    margin:0 0 6px;
  }
  .field{margin-bottom:16px;}

  /* onboarding on dark bg needs light inputs */
  .overlay select, .overlay input[type=text]{
    background:rgba(255,255,255,0.06);
    border-color:rgba(255,255,255,0.18);
    color:var(--parchment);
  }
  .overlay select option{color:#000;}
  .overlay label.field-label{color:rgba(247,242,231,0.55);}

  ::placeholder{color:#B9B0A0;}

  a{color:inherit;}

  /* ---------- modal sheet ---------- */
  .modal-overlay{
    position:absolute; inset:0; z-index:300;
    background:rgba(11,22,38,0.46);
    opacity:0; visibility:hidden;
    transition:opacity 0.2s ease, visibility 0.2s ease;
    display:flex; align-items:flex-end;
  }
  .modal-overlay.open{opacity:1; visibility:visible;}
  .modal-sheet{
    width:100%;
    max-height:88%;
    background:var(--parchment);
    border-radius:26px 26px 0 0;
    padding:20px 20px 26px;
    overflow-y:auto;
    transform:translateY(100%);
    transition:transform 0.28s cubic-bezier(.32,.72,0,1);
    scrollbar-width:none;
  }
  .modal-sheet::-webkit-scrollbar{display:none;}
  .modal-overlay.open .modal-sheet{transform:translateY(0);}
  .sheet-handle{
    width:36px; height:4px; border-radius:3px;
    background:var(--line); margin:2px auto 14px;
  }
  .sheet-title{
    font-family:var(--display); font-weight:600; font-size:21px;
    color:var(--ink-navy); margin:0 0 4px;
  }
  .sheet-close{
    position:absolute; top:16px; right:16px;
    width:30px; height:30px; border-radius:50%;
    background:var(--parchment-dim); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color:var(--text-mute); font-size:15px;
  }

  /* ---------- misc UI atoms ---------- */
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:10.5px; letter-spacing:0.06em;
    padding:5px 10px; border-radius:100px;
    background:var(--parchment-dim); color:var(--text-mute);
    text-transform:uppercase;
  }
  .chip.brass{background:rgba(200,155,60,0.16); color:#8a6a1f;}
  .chip.sage{background:rgba(110,139,116,0.16); color:#3f5a45;}
  .chip.rust{background:rgba(181,83,60,0.14); color:var(--rust);}

  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .stat-box{
    background:#fff; border:1px solid var(--line); border-radius:16px;
    padding:14px 16px;
  }
  .stat-num{font-family:var(--display); font-weight:600; font-size:26px; color:var(--ink-navy); line-height:1;}
  .stat-label{font-family:var(--mono); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-mute); margin-top:6px; display:block;}

  .section-label{
    font-family:var(--mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--text-mute); margin:22px 0 10px; display:flex; align-items:center; justify-content:space-between;
  }
  .section-label:first-child{margin-top:4px;}

  .list-item{
    display:flex; align-items:center; gap:12px;
    padding:13px 4px; border-bottom:1px solid var(--line);
  }
  .list-item:last-child{border-bottom:none;}
  .li-icon{
    width:36px; height:36px; border-radius:10px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    background:var(--parchment-dim); font-size:17px;
  }
  .li-body{flex:1 1 auto; min-width:0;}
  .li-title{font-weight:600; font-size:14px; color:var(--text-main);}
  .li-sub{font-size:12px; color:var(--text-mute); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* compass dial - signature DMIS component */
  .dial-wrap{ text-align:center; padding:6px 0 2px; }
  .dial-stage-name{font-family:var(--display); font-weight:600; font-size:19px; color:var(--ink-navy); margin-top:2px;}
  .dial-stage-group{font-family:var(--mono); font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-mute); margin-top:2px;}
  .needle{ transform-origin:100px 100px; transition:transform 1s cubic-bezier(.22,1,.36,1); }

  /* mood/challenge selector */
  .mood-row{display:flex; gap:8px; justify-content:space-between; margin:6px 0 4px;}
  .mood-btn{
    flex:1; aspect-ratio:1; border-radius:14px; border:1.5px solid var(--line);
    background:#fff; font-size:21px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }
  .mood-btn.selected{border-color:var(--brass); background:rgba(200,155,60,0.12); transform:scale(1.06);}

  .quiz-opt{
    display:block; width:100%; text-align:left;
    background:#fff; border:1.5px solid var(--line); border-radius:14px;
    padding:12px 14px; margin-bottom:9px; font-size:13.5px; color:var(--text-main);
    cursor:pointer; transition:border-color 0.15s ease, background 0.15s ease;
  }
  .quiz-opt.selected{border-color:var(--brass); background:rgba(200,155,60,0.10);}
  .quiz-progress{height:5px; border-radius:3px; background:var(--parchment-dim); overflow:hidden; margin-bottom:18px;}
  .quiz-progress-fill{height:100%; background:var(--brass); border-radius:3px; transition:width 0.25s ease;}

  /* chat */
  .chat-scroll{
    display:flex; flex-direction:column; gap:10px;
    padding-bottom:8px;
  }
  .bubble{max-width:82%; padding:11px 14px; border-radius:16px; font-size:13.5px; line-height:1.48;}
  .bubble.user{align-self:flex-end; background:var(--ink-navy); color:var(--parchment); border-bottom-right-radius:5px;}
  .bubble.ai{align-self:flex-start; background:#fff; border:1px solid var(--line); color:var(--text-main); border-bottom-left-radius:5px;}
  .bubble.ai.typing{color:var(--text-mute); font-style:italic;}
  .chat-inputbar{
    position:sticky; bottom:0; display:flex; gap:8px; align-items:flex-end;
    background:var(--parchment); padding-top:8px;
  }
  .chat-inputbar textarea{resize:none; max-height:80px; min-height:42px; font-size:13.5px; padding:10px 12px;}
  .chat-send{
    flex:0 0 auto; width:42px; height:42px; border-radius:50%;
    background:var(--brass); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }

  .streak-flame{font-size:15px;}

  .progress-bar-track{height:8px; border-radius:5px; background:var(--parchment-dim); overflow:hidden;}
  .progress-bar-fill{height:100%; border-radius:5px; background:var(--sage);}

  .empty-state{
    text-align:center; padding:34px 14px; color:var(--text-mute);
  }
  .empty-state .glyph{font-size:26px; margin-bottom:8px; display:block;}
  .empty-state .msg{font-size:13px; line-height:1.5;}

  .link-btn{
    background:none; border:none; padding:0; cursor:pointer;
    font-family:var(--mono); font-size:10.5px; letter-spacing:0.06em;
    text-transform:uppercase; color:var(--brass); font-weight:500;
  }

  textarea{font-family:var(--body);}
</style>
</head>
<body>

<div class="backdrop-mark"></div>

<div class="phone">
  <div class="notch"></div>
  <div class="statusbar">
    <span id="clockLabel">9:41</span>
    <span style="font-family:var(--mono); font-size:11px; letter-spacing:0.08em;">CULTURECOMPASS</span>
  </div>

  <div class="app-body" id="appBody">

    <!-- ================= ONBOARDING ================= -->
    <div class="overlay" id="onboarding">
      <div class="overlay-scroll" id="onboardingScroll"></div>
      <div id="onboardingFooter"></div>
    </div>

    <!-- ================= MODAL SHEET (journal entry / quiz / translate) ================= -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-sheet" id="modalSheet"></div>
    </div>

    <!-- ================= SCREENS ================= -->
    <div class="screen active" id="screen-home"></div>
    <div class="screen" id="screen-coach"></div>
    <div class="screen" id="screen-track"></div>
    <div class="screen" id="screen-journal"></div>
    <div class="screen" id="screen-growth"></div>

  </div>

  <div class="tabbar" id="tabbar">
    <!-- tabs injected by JS -->
  </div>
</div>

<script>
/* =========================================================================
   CultureCompass — demo prototype
   Single-file app. Persists via window.storage when available (Claude
   artifacts), falls back to an in-memory store otherwise so the demo
   always works standalone.
   ========================================================================= */

/* ---------------------------- storage layer ---------------------------- */
const memoryStore = {};
async function storeGet(key){
  try{
    if (window.storage && window.storage.get){
      const r = await window.storage.get(key, false);
      return r ? JSON.parse(r.value) : null;
    }
  }catch(e){ /* not found or unavailable — fall through */ }
  return memoryStore.hasOwnProperty(key) ? memoryStore[key] : null;
}
async function storeSet(key, value){
  memoryStore[key] = value;
  try{
    if (window.storage && window.storage.set){
      await window.storage.set(key, JSON.stringify(value), false);
    }
  }catch(e){ /* silently keep memory copy */ }
}

/* ------------------------------ constants ------------------------------ */
const COUNTRIES = [
  "Japan","United States","China","South Korea","India","Vietnam","Indonesia",
  "Philippines","Thailand","Taiwan","United Kingdom","Germany","France","Italy",
  "Spain","Netherlands","Sweden","Poland","Russia","Turkey","Brazil","Mexico",
  "Argentina","Canada","Australia","New Zealand","Nigeria","Kenya","South Africa",
  "Egypt","Saudi Arabia","United Arab Emirates","Iran","Israel"
];

const DMIS_STAGES = [
  { name:"Denial", group:"Ethnocentric", color:"var(--rust)",
    blurb:"Cultural difference isn't really registered yet — one's own way of doing things feels like simply \u201chow things are.\u201d" },
  { name:"Defense", group:"Ethnocentric", color:"var(--rust)",
    blurb:"Difference is noticed, but often experienced as a threat — leading to \u201cus vs. them\u201d thinking or a sense that one's own culture is superior." },
  { name:"Minimization", group:"Ethnocentric", color:"var(--brass)",
    blurb:"Surface differences are visible, but there's a strong pull toward \u201cdeep down, we're all the same,\u201d which can flatten real differences." },
  { name:"Acceptance", group:"Ethnorelative", color:"var(--sage)",
    blurb:"Other cultures are recognized as genuinely different and equally legitimate ways of organizing reality — not better or worse, just different." },
  { name:"Adaptation", group:"Ethnorelative", color:"var(--sage)",
    blurb:"You can consciously shift perspective and behavior to communicate effectively, seeing situations through more than one cultural frame." },
  { name:"Integration", group:"Ethnorelative", color:"var(--sage)",
    blurb:"Cultural frames become fluid parts of identity — you move between them naturally, depending on context." }
];

// 12 statements, phrased so that agreement reflects greater intercultural
// development. Sum (12–60) maps to a DMIS stage below.
const DMIS_QUESTIONS = [
  "When something a host-culture person does confuses me, my first instinct is to ask what it means to them, not to assume it's wrong.",
  "I can usually explain a cultural custom I dislike in terms that make sense from inside that culture, not just from my own.",
  "I notice when I'm judging another culture using my own culture's rules as the only standard.",
  "I'm comfortable admitting that my own culture's way of doing something isn't the only reasonable way.",
  "When I feel frustrated by cultural difference, I can usually name what specifically triggered that reaction.",
  "I can adjust how I communicate (directness, formality, silence) depending on who I'm speaking with.",
  "I don't assume that people who are polite/quiet/direct in one culture would behave that way everywhere.",
  "I actively look for the logic behind an unfamiliar custom before deciding how I feel about it.",
  "I can hold two different cultural perspectives on the same situation without needing to pick a \u201ccorrect\u201d one.",
  "I've changed a habit or assumption of mine after understanding it better through another culture's eyes.",
  "I notice cultural influences on my own behavior, not just on other people's.",
  "I feel reasonably steady, not just tolerant, when I'm the odd one out in a room."
];

function scoreToStageIndex(total){
  if (total <= 20) return 0;
  if (total <= 28) return 1;
  if (total <= 36) return 2;
  if (total <= 44) return 3;
  if (total <= 52) return 4;
  return 5;
}

const MOODS = [
  { v:1, e:"\u{1F62B}", label:"Overwhelmed" },
  { v:2, e:"\u{1F615}", label:"Uneasy" },
  { v:3, e:"\u{1F610}", label:"Neutral" },
  { v:4, e:"\u{1F642}", label:"Settling in" },
  { v:5, e:"\u{1F604}", label:"Thriving" }
];

const CHALLENGES = [
  "Ask someone from your host culture to explain a custom you don't fully understand — without judging it first.",
  "Notice one moment today you felt like an outsider. Write one sentence about what triggered it.",
  "Try a greeting, phrase, or gesture from your host culture that you haven't used before.",
  "Identify one assumption you're making about someone, and check whether it's cultural or just personal.",
  "Ask a local how they'd handle a disagreement with a friend. Compare it to how you'd handle it.",
  "Notice how silence is used in a conversation today. Is it comfortable, awkward, respectful?",
  "Eat a meal the way it's typically eaten in your host culture, start to finish.",
  "Pay attention to how directly people give feedback around you today. Note one example.",
  "Ask someone about a holiday or tradition from their culture that matters to them personally.",
  "Notice one thing about personal space, eye contact, or touch that differs from what feels \u201cnormal\u201d to you.",
  "Try explaining a custom from your own culture to someone as if they'd never heard of it.",
  "Identify a word or phrase in the local language that doesn't translate neatly. Ask why.",
  "Notice how people show respect to elders or authority today, and compare it to home.",
  "Reflect on one moment you felt proud of how you handled a cultural difference this week."
];

const JOURNAL_PROMPTS = [
  "Describe a moment today when you noticed a cultural difference. How did you interpret it in the moment?",
  "What assumption did you catch yourself making today, and where do you think it came from?",
  "Recall an interaction that felt confusing. What might explain it from the other person's cultural frame?",
  "What's something from your home culture you're starting to see differently since arriving here?",
  "Write about a small win — a moment things went more smoothly than you expected.",
  "What's still hard right now? No need to solve it, just name it honestly.",
  "Describe someone who has helped you feel more at home. What did they do?",
  "Free write — anything on your mind about adjusting to life here."
];

const ICONS = {
  home: '<path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H10v-5.5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1V20h3.5a1 1 0 0 0 1-1v-9"/>',
  coach: '<path d="M4 5.5A2.5 2.5 0 0 1 6.5 3h11A2.5 2.5 0 0 1 20 5.5v8A2.5 2.5 0 0 1 17.5 16H10l-4.5 4v-4H6.5A2.5 2.5 0 0 1 4 13.5z"/>',
  track: '<path d="M3 12h3.5l2-6 4 13 2.2-9.5 1.6 2.5H21"/>',
  journal: '<path d="M5 4.5A1.5 1.5 0 0 1 6.5 3H17a1.5 1.5 0 0 1 1.5 1.5v16L15 18l-3.5 2.5L8 18l-3 2.5z"/><path d="M8 8h7M8 11.3h5"/>',
  growth: '<circle cx="12" cy="12" r="9"/><path d="M12 8.3 14 12l-2 3.7L10 12z"/>',
  gear: '<circle cx="12" cy="12" r="3"/><path d="M19.4 13a7.6 7.6 0 0 0 .06-1 7.6 7.6 0 0 0-.06-1l2.1-1.65-2-3.46-2.5 1a7.6 7.6 0 0 0-1.73-1L14.9 3h-4l-.37 2.9a7.6 7.6 0 0 0-1.73 1l-2.5-1-2 3.46L6.4 11a7.6 7.6 0 0 0 0 2l-2.1 1.65 2 3.46 2.5-1c.53.43 1.12.77 1.73 1L10.9 21h4l.37-2.9c.61-.23 1.2-.57 1.73-1l2.5 1 2-3.46z"/>',

/* ---------------------------- compass dial (signature) ------------------- */
function compassDialSVG(stageIndex, opts){
  opts = opts || {};
  const size = opts.size || 220;
  const known = stageIndex !== null && stageIndex !== undefined;
  const idx = known ? stageIndex : 0;
  // semicircle from -90 to +90 across 6 segments
  const cx = 100, cy = 108, r = 78;
  const segAngle = 180/6;
  let arcs = "";
  for (let i=0;i<6;i++){
    const a0 = -90 + i*segAngle;
    const a1 = -90 + (i+1)*segAngle - 2;
    const p0 = polar(cx,cy,r,a0), p1 = polar(cx,cy,r,a1);
    const stage = DMIS_STAGES[i];
    const dim = known && i !== idx;
    const col = known ? (i===idx ? stage.color : "var(--line)") : "var(--line)";
    arcs += `<path d="M ${p0.x} ${p0.y} A ${r} ${r} 0 0 1 ${p1.x} ${p1.y}" fill="none" stroke="${col}" stroke-width="10" stroke-linecap="round" opacity="${dim?0.55:1}"/>`;
  }
  const needleAngle = known ? (-90 + segAngle*idx + segAngle/2) : -90 + segAngle/2;
  return `
  <svg viewBox="0 0 200 140" width="${size}" height="${size*0.7}">
    ${arcs}
    <circle cx="${cx}" cy="${cy}" r="6.5" fill="var(--ink-navy)"/>
    <g class="needle" style="transform-origin:${cx}px ${cy}px; transform:rotate(${needleAngle+90}deg);">
      <path d="M ${cx} ${cy-58} L ${cx-4} ${cy} L ${cx+4} ${cy} Z" fill="var(--brass)"/>
    </g>
  </svg>`;
}
function polar(cx,cy,r,angleDeg){
  const a = (angleDeg-90) * Math.PI/180;
  return { x: cx + r*Math.cos(a), y: cy + r*Math.sin(a) };
}

/* --------------------------------- sparkline ------------------------------ */
function sparkline(values, opts){
  opts = opts || {};
  const w = opts.w || 320, h = opts.h || 64, pad = 8;
  if (!values.length) return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}"></svg>`;
  const min = 1, max = 5;
  const stepX = values.length > 1 ? (w - pad*2)/(values.length-1) : 0;
  const pts = values.map((v,i)=>{
    const x = pad + stepX*i;
    const y = h - pad - ((v-min)/(max-min))*(h-pad*2);
    return [x,y];
  });
  const path = pts.map((p,i)=> (i===0?"M":"L")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const dots = pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="var(--brass)"/>`).join("");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    <path d="${path}" fill="none" stroke="var(--brass)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
}

/* ---------------------------- culture-shock phase ------------------------- */
function classifyPhase(entries){
  if (entries.length < 3){
    return { name:"Honeymoon", note:"Early days — everything still feels new and exciting. Culture shock often shows up a bit later." };
  }
  const recent = entries.slice(-5).map(e=>e.mood);
  const avg = recent.reduce((a,b)=>a+b,0)/recent.length;
  if (avg < 2.5) return { name:"Frustration", note:"Small things may feel harder than they should right now. This is a normal, common phase — not a sign you're doing anything wrong." };
  if (avg < 3.6) return { name:"Adjustment", note:"You're building routines and figuring out the unwritten rules. Things are starting to click, gradually." };
  return { name:"Acceptance", note:"You're finding your footing and functioning comfortably across both cultural frames." };
}

async function toggleChallenge(dateStr){
  const c = STATE.challenges;
  if (c.completedDates[dateStr]){
    delete c.completedDates[dateStr];
  } else {
    c.completedDates[dateStr] = true;
    // recompute streak: count consecutive days ending today
    let streak = 0;
    let d = new Date(dateStr + "T00:00:00");
    while (c.completedDates[todayStr(d)]){
      streak++;
      d.setDate(d.getDate()-1);
    }
    c.streak = streak;
    c.lastDate = dateStr;
  }
  if (!c.completedDates[dateStr]) {
    // recompute streak after un-marking
    let streak = 0;
    let d = new Date(todayStr()+"T00:00:00");
    while (c.completedDates[todayStr(d)]){ streak++; d.setDate(d.getDate()-1); }
    c.streak = streak;
  }
  await storeSet("challenges-state", c);
  renderHome();
  renderGrowth();
}

  scrollChatToBottom();

  const p = STATE.profile;
  const stageInfo = STATE.dmis ? `The user's self-assessed DMIS stage is "${DMIS_STAGES[STATE.dmis.stageIndex].name}" (${DMIS_STAGES[STATE.dmis.stageIndex].group}).` : "The user hasn't taken the DMIS self-assessment yet.";
  const systemPrompt = `You are the in-app AI cultural coach inside "CultureCompass", an app that helps people build intercultural competence using Milton Bennett's Developmental Model of Intercultural Sensitivity (DMIS) and culture-shock theory.

User profile: home culture is ${p.home}; host culture (where they currently live/study/work) is ${p.host}. ${stageInfo}

Your job:
- Help the user understand a specific cross-cultural moment, not give generic "language app" tips.
- Consider communication style differences (directness, formality, silence, hierarchy, individualism/collectivism, high/low context) between ${p.home} and ${p.host} where relevant.
- Never claim one culture's way is objectively "correct" — explain both perspectives' internal logic (ethnorelative framing).
- Gently nudge the user's thinking toward the next DMIS stage rather than lecturing about the model.
- Be warm, concise, and practical. Use short paragraphs. Avoid generic platitudes.
- Keep responses under ~140 words unless the user asks for more depth.`;

  const apiMessages = STATE.coachHistory.slice(-16).map(m => ({
    role: m.role === "user" ? "user" : "assistant",
    content: m.text
  }));

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: systemPrompt,
        messages: apiMessages
      })
    });
    const data = await response.json();
    const textBlock = (data.content || []).map(b => b.text || "").join("\n").trim();
    const reply = textBlock || "I couldn't quite form a response there — could you try rephrasing?";
    STATE.coachHistory.push({ role:"assistant", text: reply });
  }catch(e){
    STATE.coachHistory.push({ role:"assistant", text: "I'm having trouble connecting right now. Please check your connection and try again in a moment." });
  }
  await storeSet("coach-history", STATE.coachHistory);
  renderCoach();
}

/* ================================ TRACK ==================================== */
let trackSelectedMood = null;

function renderTrack(){
  const el = document.getElementById("screen-track");
  const today = todayStr();
  const already = STATE.tracker.find(e => e.date === today);
  const phase = classifyPhase(STATE.tracker);
  const values = STATE.tracker.slice(-14).map(e=>e.mood);

  el.innerHTML = `
    <div class="eyebrow" style="margin-top:8px;">CULTURE SHOCK TRACKER</div>
    <div class="screen-title" style="margin-top:2px; font-size:24px;">How adjustment is going</div>
    <div class="screen-sub">Rooted in the culture-shock curve — dips are normal, not failure.</div>

    <div class="card">
      <div class="card-row">
        <div>
          <span class="chip ${phase.name==='Frustration'?'rust':phase.name==='Honeymoon'?'brass':'sage'}">${phase.name.toUpperCase()} PHASE</span>
        </div>
      </div>
      <p style="font-size:13px; line-height:1.55; color:var(--text-mute); margin:10px 0 12px;">${phase.note}</p>
      ${values.length ? sparkline(values) : `<div class="empty-state" style="padding:14px 0;"><span class="msg">No check-ins yet — your trend line will appear here.</span></div>`}
    </div>

    <div class="section-label">${already ? "TODAY'S CHECK-IN" : "HOW ARE YOU FEELING TODAY?"}</div>
    <div class="card">
      <div class="mood-row">
        ${MOODS.map(m => `
          <button class="mood-btn ${((already?already.mood:trackSelectedMood)===m.v)?'selected':''}" onclick="pickMood(${m.v})" ${already?'disabled':''}>${m.e}</button>
        `).join("")}
      </div>
      <div style="text-align:center; font-size:11.5px; color:var(--text-mute); font-family:var(--mono); margin-bottom:14px;">
        ${already ? MOODS.find(m=>m.v===already.mood).label : (trackSelectedMood ? MOODS.find(m=>m.v===trackSelectedMood).label : "Tap a face to select")}
      </div>
      ${already ? `
        ${already.note ? `<p style="font-size:13px; color:var(--text-main); background:var(--parchment-dim); padding:10px 12px; border-radius:12px;">${escapeHtml(already.note)}</p>` : ""}
        <div style="text-align:center; margin-top:4px;"><span class="chip">✓ Logged for today</span></div>
      ` : `
        <textarea id="trackNote" placeholder="Optional note — what happened today? (optional)" rows="2"></textarea>
        <div style="height:12px;"></div>
        <button class="btn btn-brass btn-block" ${trackSelectedMood?'':'disabled'} onclick="saveCheckIn();">Save check-in</button>
      `}
    </div>

    <div class="section-label">HISTORY</div>
    ${STATE.tracker.length === 0 ? `
      <div class="empty-state"><span class="glyph">🧭</span><div class="msg">Your check-ins will build a picture of your adjustment over time.</div></div>
    ` : `
      <div class="card" style="padding:8px 12px;">
        ${STATE.tracker.slice().reverse().slice(0,20).map(e => `
          <div class="list-item">
            <div class="li-icon">${MOODS.find(m=>m.v===e.mood).e}</div>
            <div class="li-body">
              <div class="li-title">${fmtDate(e.date)} · ${MOODS.find(m=>m.v===e.mood).label}</div>
              ${e.note ? `<div class="li-sub">${escapeHtml(e.note)}</div>` : ""}
            </div>
          </div>
        `).join("")}
      </div>
    `}
  `;
}

function pickMood(v){
  trackSelectedMood = v;
  renderTrack();
}

async function saveCheckIn(){
  const note = document.getElementById("trackNote").value.trim();
  STATE.tracker.push({ id:uid(), date: todayStr(), mood: trackSelectedMood, note });
  trackSelectedMood = null;
  await storeSet("tracker-entries", STATE.tracker);
  renderTrack();
  renderHome();
  renderGrowth();
}

/* ================================ JOURNAL =================================== */
function renderJournal(){
  const el = document.getElementById("screen-journal");
  el.innerHTML = `
    <div class="card-row" style="margin-top:8px;">
      <div>
        <div class="eyebrow">REFLECTION JOURNAL</div>
        <div class="screen-title" style="margin-top:2px; font-size:24px;">Notice, don't just cope</div>
      </div>
    </div>
    <div class="screen-sub">Reflection over memorization — a place to think, not to be graded.</div>

    <button class="btn btn-primary btn-block" onclick="openNewEntry();" style="margin-bottom:18px; display:flex; align-items:center; justify-content:center; gap:6px;">
      ${icon('plus',16)} New entry
    </button>

    ${STATE.journal.length === 0 ? `
      <div class="empty-state"><span class="glyph">📓</span><div class="msg">Your first entry takes about two minutes. Pick a prompt to get started.</div></div>
    ` : `
      <div class="section-label">ENTRIES</div>
      <div class="card" style="padding:8px 12px;">
        ${STATE.journal.slice().reverse().map(j => `
          <div class="list-item" onclick="viewEntry('${j.id}')" style="cursor:pointer;">
            <div class="li-icon">📝</div>
            <div class="li-body">
              <div class="li-title">${fmtDate(j.date)}</div>
              <div class="li-sub">${escapeHtml(j.text.slice(0,54))}${j.text.length>54?'…':''}</div>
            </div>
            ${icon('chevron',16)}
          </div>
        `).join("")}
      </div>
    `}
  `;
}

function openNewEntry(){
  const promptIdx = Math.floor(Math.random()*JOURNAL_PROMPTS.length);
  openModal(`
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="closeModal();">✕</button>
    <div class="sheet-title">New reflection</div>
    <div class="card" style="background:var(--parchment-dim); border:none; margin:12px 0 16px;">
      <div class="eyebrow" style="margin-bottom:4px;">PROMPT</div>
      <p id="entryPromptText" style="font-size:13.5px; margin:0; line-height:1.5;">${escapeHtml(JOURNAL_PROMPTS[promptIdx])}</p>
      <button class="link-btn" style="margin-top:10px;" onclick="shufflePrompt();">Try another prompt →</button>
    </div>
    <textarea id="entryText" rows="7" placeholder="Write freely…"></textarea>
    <div style="height:14px;"></div>
    <button class="btn btn-brass btn-block" onclick="saveEntry();">Save entry</button>
  `);
  document.getElementById("modalSheet").dataset.promptIdx = promptIdx;
}
function shufflePrompt(){
  const sheet = document.getElementById("modalSheet");
  let idx = Math.floor(Math.random()*JOURNAL_PROMPTS.length);
  sheet.dataset.promptIdx = idx;
  document.getElementById("entryPromptText").textContent = JOURNAL_PROMPTS[idx];
}
async function saveEntry(){
  const text = document.getElementById("entryText").value.trim();
  if (!text) return;
  const idx = parseInt(document.getElementById("modalSheet").dataset.promptIdx, 10);
  STATE.journal.push({ id: uid(), date: todayStr(), prompt: JOURNAL_PROMPTS[idx], text });
  await storeSet("journal-entries", STATE.journal);
  closeModal();
  renderJournal();
  renderHome();
  renderGrowth();
}
function viewEntry(id){
  const j = STATE.journal.find(e => e.id === id);
  if (!j) return;
  openModal(`
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="closeModal();">✕</button>
    <div class="eyebrow">${fmtDateLong(j.date)}</div>
    <div class="sheet-title" style="font-size:17px; margin-top:6px;">${escapeHtml(j.prompt)}</div>
    <p style="font-size:14px; line-height:1.65; white-space:pre-wrap; margin-top:14px;">${escapeHtml(j.text)}</p>
    <button class="btn btn-ghost btn-block" style="margin-top:18px; color:var(--rust); border-color:var(--rust);" onclick="deleteEntry('${j.id}');">Delete entry</button>
  `);
}
async function deleteEntry(id){
  STATE.journal = STATE.journal.filter(e => e.id !== id);
  await storeSet("journal-entries", STATE.journal);
  closeModal();
  renderJournal();
  renderHome();
  renderGrowth();
}

/* ================================ GROWTH =================================== */
function renderGrowth(){
  const el = document.getElementById("screen-growth");
  const today = todayStr();
  const challengeIdx = dayOfYear(new Date()) % CHALLENGES.length;
  const daysActive = STATE.profile ? Math.max(1, Math.round((new Date(today) - new Date(STATE.profile.createdAt))/86400000)+1) : 1;
  const values = STATE.tracker.slice(-14).map(e=>e.mood);

  el.innerHTML = `
    <div class="eyebrow" style="margin-top:8px;">YOUR GROWTH</div>
    <div class="screen-title" style="margin-top:2px; font-size:24px;">Development, made visible</div>
    <div class="screen-sub">DMIS stage, streaks, and reflection — all in one place.</div>

    <div class="card">
      <div class="dial-wrap">
        ${compassDialSVG(STATE.dmis ? STATE.dmis.stageIndex : null, {size:190})}
        ${STATE.dmis ? `
          <div class="dial-stage-name">${DMIS_STAGES[STATE.dmis.stageIndex].name}</div>
          <div class="dial-stage-group">${DMIS_STAGES[STATE.dmis.stageIndex].group} STAGE · SCORED ${STATE.dmis.score}/60</div>
          <p style="font-size:12.5px; color:var(--text-mute); line-height:1.55; margin:10px 4px 14px;">${DMIS_STAGES[STATE.dmis.stageIndex].blurb}</p>
        ` : `
          <div class="dial-stage-name">Not yet assessed</div>
          <div class="dial-stage-group" style="color:var(--brass);">TAKE THE 2-MINUTE ASSESSMENT</div>
          <div style="height:12px;"></div>
        `}
      </div>
      <button class="btn ${STATE.dmis?'btn-ghost':'btn-brass'} btn-block" onclick="startQuiz();">${STATE.dmis ? 'Retake assessment' : 'Take DMIS assessment'}</button>
    </div>

    <div class="section-label">STATS</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${daysActive}</div><span class="stat-label">Days on CultureCompass</span></div>
      <div class="stat-box"><div class="stat-num">${STATE.challenges.streak}</div><span class="stat-label">Current streak</span></div>
      <div class="stat-box"><div class="stat-num">${STATE.journal.length}</div><span class="stat-label">Journal entries</span></div>
      <div class="stat-box"><div class="stat-num">${Object.keys(STATE.challenges.completedDates).length}</div><span class="stat-label">Challenges done</span></div>
    </div>

    ${values.length ? `
      <div class="section-label">MOOD TREND (LAST 14 CHECK-INS)</div>
      <div class="card">${sparkline(values)}</div>
    ` : ""}

    <div class="section-label">DAILY CHALLENGES</div>
    <div class="card" style="padding:8px 12px;">
      ${CHALLENGES.map((c,i) => {
        const isToday = i === challengeIdx;
        const doneToday = isToday && !!STATE.challenges.completedDates[today];
        return `
        <div class="list-item">
          <div class="li-icon">${doneToday ? icon('check',16) : (isToday ? '📍' : '·')}</div>
          <div class="li-body">
            <div class="li-title" style="${isToday?'':'color:var(--text-mute); font-weight:500;'}">${escapeHtml(c.slice(0,58))}${c.length>58?'…':''}</div>
            ${isToday ? `<div class="li-sub" style="color:var(--brass);">TODAY</div>` : ""}
          </div>
        </div>`;
      }).join("")}
    </div>

    <div class="section-label">TOOLS</div>
    <div class="card" style="padding:8px 12px;">
      <div class="list-item" onclick="openTranslate();" style="cursor:pointer;">
        <div class="li-icon">${icon('translate',18)}</div>
        <div class="li-body"><div class="li-title">Quick translate</div><div class="li-sub">Translate a phrase for daily situations</div></div>
        ${icon('chevron',16)}
      </div>
      <div class="list-item" onclick="openEditProfile();" style="cursor:pointer;">
        <div class="li-icon">${icon('gear',18)}</div>
        <div class="li-body"><div class="li-title">Edit home / host culture</div><div class="li-sub">${escapeHtml(STATE.profile.home)} → ${escapeHtml(STATE.profile.host)}</div></div>
        ${icon('chevron',16)}
      </div>
    </div>
  `;
}

/* ------------------------------ DMIS quiz ---------------------------------- */
let quizAnswers = [];
let quizIndex = 0;

function startQuiz(){
  quizAnswers = new Array(DMIS_QUESTIONS.length).fill(null);
  quizIndex = 0;
  renderQuiz();
}
function renderQuiz(){
  const total = DMIS_QUESTIONS.length;
  const pct = Math.round(((quizIndex)/total)*100);
  openModal(`
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="closeModal();">✕</button>
    <div class="eyebrow">DMIS SELF-ASSESSMENT · ${quizIndex+1} OF ${total}</div>
    <div class="quiz-progress" style="margin-top:12px;"><div class="quiz-progress-fill" style="width:${pct}%;"></div></div>
    <p style="font-size:16px; line-height:1.5; font-family:var(--display); font-weight:500; margin:4px 0 18px;">${escapeHtml(DMIS_QUESTIONS[quizIndex])}</p>
    ${["Strongly disagree","Disagree","Neutral","Agree","Strongly agree"].map((label,i)=>`
      <button class="quiz-opt ${quizAnswers[quizIndex]===i+1?'selected':''}" onclick="answerQuiz(${i+1})">${label}</button>
    `).join("")}
  `);
}
function answerQuiz(val){
  quizAnswers[quizIndex] = val;
  if (quizIndex < DMIS_QUESTIONS.length - 1){
    quizIndex++;
    renderQuiz();
  } else {
    finishQuiz();
  }
}
async function finishQuiz(){
  const total = quizAnswers.reduce((a,b)=>a+b,0);
  const stageIndex = scoreToStageIndex(total);
  STATE.dmis = { stageIndex, score: total, date: todayStr() };
  await persistUserState();
  const stage = DMIS_STAGES[stageIndex];
  openModal(`
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="closeModal(); renderGrowth(); renderHome(); renderCoach();">✕</button>
    <div style="text-align:center; padding-top:6px;">
      ${compassDialSVG(stageIndex, {size:190})}
      <div class="dial-stage-group">${stage.group} STAGE</div>
      <div class="dial-stage-name" style="font-size:24px;">${stage.name}</div>
      <p style="font-size:13.5px; line-height:1.6; color:var(--text-mute); margin:12px 4px 20px;">${stage.blurb}</p>
      <button class="btn btn-primary btn-block" onclick="closeModal(); renderGrowth(); renderHome(); renderCoach(); switchTab('growth');">See my growth page</button>
    </div>
  `);
}

/* ------------------------------ translate tool ------------------------------ */
const TRANSLATE_LANGS = ["English","Japanese","Spanish","French","German","Mandarin Chinese","Korean","Portuguese","Arabic","Hindi","Vietnamese","Thai","Russian","Italian"];
function openTranslate(){
  openModal(`
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="closeModal();">✕</button>
    <div class="sheet-title">Quick translate</div>
    <p class="screen-sub" style="margin-bottom:16px;">For everyday phrases — always double-check anything important.</p>
    <div class="field">
      <label class="field-label">Text</label>
      <textarea id="trText" rows="3" placeholder="Type a phrase…"></textarea>
    </div>
    <div class="field">
      <label class="field-label">Translate to</label>
      <select id="trLang">${TRANSLATE_LANGS.map(l=>`<option value="${l}">${l}</option>`).join("")}</select>
    </div>
    <button class="btn btn-brass btn-block" onclick="runTranslate();">Translate</button>
    <div id="trResult"></div>
  `);
}
async function runTranslate(){
  const text = document.getElementById("trText").value.trim();
  const lang = document.getElementById("trLang").value;
  const resultEl = document.getElementById("trResult");
  if (!text){ return; }
  resultEl.innerHTML = `<p style="margin-top:14px; font-size:13px; color:var(--text-mute);">Translating…</p>`;
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 300,
        system: `You are a translation tool. Translate the user's text into ${lang}. Respond with ONLY the translation and nothing else — no notes, no quotation marks, no explanation.`,
        messages: [{ role:"user", content: text }]
      })
    });
    const data = await response.json();
    const out = (data.content||[]).map(b=>b.text||"").join("").trim();
    resultEl.innerHTML = `
      <div class="card" style="background:var(--parchment-dim); border:none; margin-top:14px;">
        <div class="eyebrow" style="margin-bottom:6px;">${lang.toUpperCase()}</div>
        <p style="font-size:14.5px; margin:0; line-height:1.55;">${escapeHtml(out || "Couldn't translate that — try again.")}</p>
      </div>`;
  }catch(e){
    resultEl.innerHTML = `<p style="margin-top:14px; font-size:13px; color:var(--rust);">Translation failed — check your connection and try again.</p>`;
  }
}

/* ================================= GO ====================================== */
boot();
</script>
