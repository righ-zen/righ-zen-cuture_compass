<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CultureCompass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-navy:#12233F;
    --midnight:#0B1626;
    --brass:#C89B3C;
    --brass-light:#E4C878;
    --parchment:#F7F2E7;
    --parchment-dim:#EFE7D3;
    --sage:#6E8B74;
    --rust:#B5533C;
    --text-main:#1F2A3C;
    --text-mute:#5B6B82;
    --line:#DCD3BC;

    --display:'Nunito', sans-serif;
    --body:'Nunito', sans-serif;
    --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--body);
    color:var(--text-main);
    background:var(--midnight);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    margin:0;
    overflow:hidden;
  }

  /* ---------- phone shell ---------- */
  .phone{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    padding-top: env(safe-area-inset-top, 20px);
    padding-bottom: env(safe-area-inset-bottom, 20px);
    background:var(--parchment);
  }
  .statusbar{
    display: none !important;
  }

  /* ---------- app body / screens ---------- */
  .app-body{
    flex:1 1 auto;
    position:relative;
    overflow:hidden;
    background:var(--parchment);
  }
  .screen{
    position:absolute;
    inset:0;
    overflow-y:auto;
    padding:16px 20px 32px;
    opacity:0;
    visibility:hidden;
    transform:translateY(6px);
    transition:opacity 0.22s ease, transform 0.22s ease;
    scrollbar-width:none;
  }
  .screen::-webkit-scrollbar{display:none;}
  .screen.active{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
    z-index:10;
  }

  /* チャット画面だけ下部の入力バーの高さ(70px)分の余白を空ける */
  #screen-coach {
    padding-bottom: 80px !important;
  }

  .screen-title{
    font-family:var(--display);
    font-weight:900;
    font-size:28px;
    letter-spacing:-0.01em;
    margin:10px 0 2px;
    color:var(--ink-navy);
  }
  .screen-sub{
    font-family:var(--body);
    font-weight:700;
    font-size:14px;
    color:var(--text-mute);
    margin:0 0 18px;
    line-height:1.4;
  }
  .eyebrow{
    font-family:var(--display);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--brass);
    font-weight:900;
  }

  /* ---------- card ---------- */
  .card{
    background:#fff;
    border:2px solid var(--line);
    border-radius:24px;
    padding:20px;
    margin-bottom:16px;
    box-shadow: 0 2px 4px rgba(18, 35, 63, 0.03);
  }
  .card-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}

  /* ---------- 3D buttons ---------- */
  button{font-family:var(--body);}
  .btn{
    appearance:none;
    border:none;
    border-radius:20px;
    padding:15px 22px;
    font-family:var(--body);
    font-weight:800;
    font-size:16px;
    cursor:pointer;
    position:relative;
    transition: all 0.1s ease;
  }
  .btn-primary {
    background: var(--ink-navy);
    color: var(--parchment);
    box-shadow: 0 4px 0 #0b1626;
  }
  .btn-primary:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 #0b1626;
  }
  .btn-brass {
    background: var(--brass);
    color: var(--midnight);
    box-shadow: 0 4px 0 #96732b;
  }
  .btn-brass:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 #96732b;
  }
  .btn-ghost {
    background: #fff;
    color: var(--ink-navy);
    border: 2px solid var(--line);
    box-shadow: 0 4px 0 var(--line);
  }
  .btn-ghost:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 var(--line);
  }
  .btn-block{width:100%;}
  .btn:disabled{opacity:0.45; cursor:not-allowed; transform:none !important; box-shadow:none !important;}

  /* ---------- tab bar ---------- */
  .tabbar{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-around;
    padding:12px 6px 32px;
    background:#fff;
    border-top:2px solid var(--line);
    z-index:60;
  }
  .tab{
    background:none; border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--text-mute);
    font-family:var(--display);
    font-weight:800;
    font-size:11px;
    padding:4px 8px;
    border-radius:12px;
    transition:color 0.15s ease;
  }
  .tab svg{width:22px; height:22px; stroke:var(--text-mute); stroke-width:2.2; transition:stroke 0.15s ease;}
  .tab.active{color:var(--ink-navy);}
  .tab.active svg{stroke:var(--brass); fill: rgba(200,155,60,0.1);}

  /* ---------- onboarding overlay ---------- */
  .overlay{
    position:absolute; inset:0; z-index:200;
    background:var(--ink-navy);
    display:flex; flex-direction:column;
    padding:44px 26px 32px;
    color:var(--parchment);
    opacity:1; visibility:visible;
    transition:opacity 0.25s ease, visibility 0.25s ease;
  }
  .overlay.hidden{opacity:0; visibility:hidden; pointer-events:none;}
  .overlay-scroll{flex:1 1 auto; overflow-y:auto; scrollbar-width:none;}
  .overlay-scroll::-webkit-scrollbar{display:none;}

  select, input[type=text], textarea{
    width:100%;
    font-family:var(--body);
    font-weight:700;
    font-size:15px;
    padding:14px;
    border-radius:16px;
    border:2px solid var(--line);
    background:#fff;
    color:var(--text-main);
    outline:none;
  }
  select:focus, input[type=text]:focus, textarea:focus{border-color:var(--brass);}
  label.field-label{
    display:block;
    font-family:var(--display);
    font-weight:800;
    font-size:12px;
    text-transform:uppercase;
    color:var(--text-mute);
    margin:0 0 8px;
  }
  .field{margin-bottom:20px;}

  .overlay select, .overlay input[type=text]{
    background:rgba(255,255,255,0.06);
    border-color:rgba(255,255,255,0.18);
    color:var(--parchment);
  }
  .overlay select option{color:#000;}
  .overlay label.field-label{color:rgba(247,242,231,0.55);}

  ::placeholder{color:#B9B0A0;}

  /* ---------- modal sheet ---------- */
  .modal-overlay{
    position:absolute; inset:0; z-index:300;
    background:rgba(11,22,38,0.5);
    opacity:0; visibility:hidden;
    transition:opacity 0.2s ease, visibility 0.2s ease;
    display:flex; align-items:flex-end;
  }
  .modal-overlay.open{opacity:1; visibility:visible;}
  .modal-sheet{
    width:100%;
    max-height:88%;
    background:var(--parchment);
    border-radius:32px 32px 0 0;
    padding:24px 20px 36px;
    overflow-y:auto;
    transform:translateY(100%);
    transition:transform 0.28s cubic-bezier(.32,.72,0,1);
    scrollbar-width:none;
  }
  .modal-sheet::-webkit-scrollbar{display:none;}
  .modal-overlay.open .modal-sheet{transform:translateY(0);}
  .sheet-handle{
    width:40px; height:6px; border-radius:3px;
    background:var(--line); margin:2px auto 18px;
  }

  .sheet-close {
    width:40px !important;
    height:40px !important;
    border-radius:50% !important;
    background:var(--parchment-dim);
    border:none;
    cursor:pointer;
    display:inline-flex !important;
    align-items:center !important;
    justify-content:center !important;
    color:var(--text-mute);
    padding:0 !important;
    margin:0;
  }
  .sheet-close svg, .btn-ghost svg {
    display:block;
  }

  .dial-wrap{ 
    text-align:center !important; 
    padding:6px 0 2px; 
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .needle{ 
    transform-origin: 100px 108px !important; 
    transition: transform 1s cubic-bezier(.22,1,.36,1); 
  }

  /* ---------- チャット入力バーの位置を画面最下部に完全固定 ---------- */
  .chat-inputbar{
    position:absolute !important;
    bottom:0 !important;
    left:0 !important;
    width:100% !important;
    display:flex;
    gap:8px;
    align-items:center;
    background:var(--parchment);
    padding:12px 20px 16px 20px;
    border-top: 1px solid rgba(0,0,0,0.04);
    z-index:50;
  }
  .chat-inputbar textarea{
    resize:none;
    max-height:46px;
    min-height:46px;
    font-size:14.5px;
    padding:12px 14px;
    border-radius:24px;
  }

  /* ---------- misc UI atoms ---------- */
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--display); font-weight:800; font-size:11px;
    padding:6px 12px; border-radius:14px;
    background:var(--parchment-dim); color:var(--text-mute);
  }
  .chip.brass{background:rgba(200,155,60,0.14); color:#8a6a1f;}
  .chip.sage{background:rgba(110,139,116,0.16); color:#2f4734;}
  .chip.rust{background:rgba(181,83,60,0.12); color:var(--rust);}

  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .stat-box{
    background:#fff; border:2px solid var(--line); border-radius:20px;
    padding:16px;
  }
  .stat-num{font-family:var(--display); font-weight:900; font-size:26px; color:var(--ink-navy); line-height:1;}
  .stat-label{font-family:var(--display); font-weight:800; font-size:11px; text-transform:uppercase; color:var(--text-mute); margin-top:6px; display:block;}

  .section-label{
    font-family:var(--display); font-weight:900; font-size:13px; letter-spacing:0.03em; text-transform:uppercase;
    color:var(--text-mute); margin:24px 0 12px; display:flex; align-items:center; justify-content:space-between;
  }

  .list-item{
    display:flex; align-items:center; gap:14px;
    padding:14px 4px; border-bottom:2px solid var(--line);
  }
  .list-item:last-child{border-bottom:none;}
  .li-icon{
    width:38px; height:38px; border-radius:12px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    background:var(--parchment-dim); font-size:18px;
  }
  .li-body{flex:1 1 auto; min-width:0;}
  .li-title{font-weight:800; font-size:14.5px; color:var(--text-main);}
  .li-sub{font-weight:600; font-size:12.5px; color:var(--text-mute); margin-top:2px;}

  .quiz-progress{height:12px; border-radius:10px; background:var(--parchment-dim); overflow:hidden; margin-bottom:20px; border: 2px solid var(--line);}
  .quiz-progress-fill{height:100%; background:var(--brass); border-radius:8px; transition:width 0.25s ease;}

  /* chat */
  .bubble{max-width:82%; padding:12px 16px; border-radius:20px; font-size:14.5px; line-height:1.5; font-weight:600;}
  .bubble.user{align-self:flex-end; background:var(--ink-navy); color:var(--parchment); border-bottom-right-radius:4px;}
  .bubble.ai{align-self:flex-start; background:#fff; border:2px solid var(--line); color:var(--text-main); border-bottom-left-radius:4px;}
</style>
</head>

<script>
const memoryStore = {};
async function storeGet(key){
  try{
    if (window.storage && window.storage.get){
      const r = await window.storage.get(key, false);
      return r ? JSON.parse(r.value) : null;
    }
  }catch(e){}
  return memoryStore.hasOwnProperty(key) ? memoryStore[key] : null;
}
async function storeSet(key, value){
  memoryStore[key] = value;
  try {
    if (window.storage && window.storage.set) {
      await window.storage.set(key, JSON.stringify(value), false);
    }
  } catch(e) {}
}

const COUNTRIES = ["Japan","United States","China","South Korea","India","Vietnam","Indonesia","Philippines","Thailand","Taiwan","United Kingdom","Germany","France","Italy","Spain","Netherlands","Sweden","Poland","Russia","Turkey","Brazil","Mexico","Argentina","Canada","Australia","New Zealand","Nigeria","Kenya","South Africa","Egypt","Saudi Arabia","United Arab Emirates","Iran","Israel"];

const DMIS_STAGES = [
  { name:"Denial", group:"Ethnocentric", color:"var(--rust)", blurb:"Cultural difference isn't fully registered yet — one's own way of doing things feels like simply 'how things are'." },
  { name:"Defense", group:"Ethnocentric", color:"var(--rust)", blurb:"Difference is noticed but experienced as a threat, often leading to 'us vs. them' thinking or an assumption of cultural superiority." },
  { name:"Minimization", group:"Ethnocentric", color:"var(--brass)", blurb:"Surface differences are visible, but deep down there is a strong insistence that 'we are all the same,' which can flatten critical cultural nuances." },
  { name:"Acceptance", group:"Ethnorelative", color:"var(--sage)", blurb:"Other cultures are recognized as genuinely different and equally legitimate ways of organizing reality — not better or worse, just different." },
  { name:"Adaptation", group:"Ethnorelative", color:"var(--sage)", blurb:"You can consciously shift perspective and behavior to communicate effectively, seeing situations through more than one cultural lens." },
  { name:"Integration", group:"Ethnorelative", color:"var(--sage)", blurb:"Cultural frames become fluid parts of identity — you move between them naturally, depending on context." }
];

const DMIS_QUESTIONS = [
  "When something a host-culture person does confuses me, my first instinct is to ask what it means to them, not to assume it's wrong.",
  "I can usually explain a cultural custom I dislike in terms that make sense from inside that culture, not just from my own perspective.",
  "I notice when I'm judging another culture using my own culture's rules as the only standard.",
  "I'm comfortable admitting that my own culture's way of doing something isn't the only reasonable way.",
  "When I feel frustrated by cultural difference, I can usually name what specifically triggered that reaction.",
  "I can adjust how I communicate (directness, formality, silence) depending on who I'm speaking with.",
  "I don't assume that people who are polite, quiet, or direct in one culture are behaving purely out of individual personality traits.",
  "I actively look for the logic behind an unfamiliar custom before deciding how I feel about it personally.",
  "I can hold two different cultural perspectives on the same situation without needing to pick a 'correct' one.",
  "I've changed a habit or assumption of mine after understanding it better through another culture's eyes.",
  "I notice cultural influences on my own behavior, not just on other people's.",
  "I feel reasonably steady and self-contained, not just tolerant, when I'm the obvious cultural outsider in a room."
];

function scoreToStageIndex(total){
  if (total <= 20) return 0; if (total <= 28) return 1; if (total <= 36) return 2; if (total <= 44) return 3; if (total <= 52) return 4; return 5;
}

const MOODS = [
  { v:1, e:"😫", label:"Overwhelmed" },
  { v:2, e:"😕", label:"Slightly Uneasy" },
  { v:3, e:"😐", label:"Neutral / Flat" },
  { v:4, e:"🙂", label:"Settling In" },
  { v:5, e:"🥳", label:"Thriving!" }
];

const CHALLENGES = [
  "Ask someone from your host culture to explain a custom you don't fully understand — completely without judging it.",
  "Notice one specific moment today you felt like an outsider. Write one objective sentence about what triggered it.",
  "Try a greeting, phrase, or gesture from your host culture that you haven't personally used before.",
  "Identify one assumption you are making about someone around you today, and check whether it is cultural or just personal.",
  "Ask a local how they typically handle a minor disagreement with a friend. Compare it to your home approach.",
  "Pay attention to how silence is used in a conversation today. Is it comfortable, awkward, or a sign of respect?",
  "Eat a meal exactly the way it is typically eaten in your host culture, from start to finish.",
  "Notice how directly or indirectly people give feedback around you today. Spot one concrete example.",
  "Ask a local about a holiday or tradition from their culture that genuinely matters to them personally.",
  "Notice one thing about personal space, eye contact, or touch that differs from what feels 'normal' to you.",
  "Try explaining a common custom from your home culture to a local as if they had never heard of it before.",
  "Identify a local word or phrase that doesn't translate neatly into your language. Ask why that concept exists.",
  "Observe how people show respect to authority or elders today, and compare it directly to your home culture.",
  "Reflect on one moment this week where you handled a cultural difference smoothly and feel proud of your response."
];

const JOURNAL_PROMPTS = [
  "Describe a moment today when you noticed a cultural difference. How did you interpret it initially?",
  "What implicit assumption did you catch yourself making today, and where do you think it originates?",
  "Recall an interaction that felt confusing. What might explain it logically from the other person's cultural frame?",
  "What is something from your home culture that you are starting to view differently since arriving here?",
  "Write about a small cross-cultural win — a moment where an interaction went more smoothly than expected.",

];

const ICONS = {
  home: '<path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H10v-5.5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1V20h3.5a1 1 0 0 0 1-1v-9"/>',
  coach: '<path d="M4 5.5A2.5 2.5 0 0 1 6.5 3h11A2.5 2.5 0 0 1 20 5.5v8A2.5 2.5 0 0 1 17.5 16H10l-4.5 4v-4H6.5A2.5 2.5 0 0 1 4 13.5z"/>',

};
function icon(name, size){ return `<svg viewBox="0 0 24 24" width="${size||22}" height="${size||22}" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]}</svg>`; }

const TABS = [{ id:"home", label:"Home", icon:"home" }, { id:"coach", label:"Coach", icon:"coach" }, { id:"track", label:"Track", icon:"track" }, { id:"journal", label:"Journal", icon:"journal" }, { id:"growth", label:"Growth", icon:"growth" }];

let STATE = { profile: null, dmis: null, tracker: [], journal: [], challenges: { completedDates:{}, streak:0, lastDate:null }, coachHistory: [] };
let activeTab = "home"; let onboardingStep = 0; let onboardingDraft = { name:"", home:"", host:"" };

function todayStr(d){ const dt = d || new Date(); return dt.toISOString().slice(0,10); }
function fmtDate(iso){ const d = new Date(iso + "T00:00:00"); return d.toLocaleDateString(undefined, { month:"short", day:"numeric" }); }
function fmtDateLong(iso){ const d = new Date(iso + "T00:00:00"); return d.toLocaleDateString(undefined, { weekday:"long", month:"long", day:"numeric" }); }
function dayOfYear(d){ const start = new Date(d.getFullYear(), 0, 0); const diff = d - start; return Math.floor(diff / 86400000); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function greetingWord(){ const h = new Date().getHours(); if (h < 12) return "GOOD MORNING"; if (h < 18) return "GOOD AFTERNOON"; return "GOOD EVENING"; }

function compassDialSVG(stageIndex, opts){
  opts = opts || {}; 
  const size = opts.size || 220; 
  const known = stageIndex !== null && stageIndex !== undefined; 
  const idx = known ? stageIndex : 0; 
  const cx = 100, cy = 108, r = 78; 
  const segAngle = 180 / 6; 
  let arcs = "";
  
  for (let i = 0; i < 6; i++) {
    const a0 = -90 + i * segAngle; 
    const a1 = -90 + (i + 1) * segAngle - 2; 
    const p0 = polar(cx, cy, r, a0); 
    const p1 = polar(cx, cy, r, a1); 
    const stage = DMIS_STAGES[i]; 
    const dim = known && i !== idx; 
    /* 未診断時はすべてライトグレー、診断後は現在のステージの色のみ鮮やかに、他は薄く透過 */
    const col = known ? (i === idx ? stage.color : "var(--line)") : "var(--line)";
    arcs += `<path d="M ${p0.x} ${p0.y} A ${r} ${r} 0 0 1 ${p1.x} ${p1.y}" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round" opacity="${dim ? 0.3 : 1}"/>`;
  }
  
  /* SafariのCSSバグを回避するため、SVGのtransform属性で針を100%正確に回転 */
  const needleAngle = known ? (-90 + segAngle * idx + segAngle / 2) : -90 + segAngle / 2;
  return `<svg viewBox="0 0 200 140" width="${size}" height="${size*0.7}">${arcs}<circle cx="${cx}" cy="${cy}" r="7" fill="var(--ink-navy)"/><path class="needle" d="M ${cx} ${cy-58} L ${cx-4} ${cy} L ${cx+4} ${cy} Z" fill="var(--brass)" transform="rotate(${needleAngle+90} ${cx} ${cy})"/></svg>`;
}

function polar(cx, cy, r, angleDeg) { 
  const a = (angleDeg - 90) * Math.PI / 180; 
  return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) }; 
}
  
function sparkline(values, opts){
  opts = opts || {}; const w = opts.w || 320, h = opts.h || 64, pad = 8; if (!values.length) return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}"></svg>`; const min = 1, max = 5; const stepX = values.length > 1 ? (w - pad*2)/(values.length-1) : 0;
  const pts = values.map((v,i)=>{ const x = pad + stepX*i; const y = h - pad - ((v-min)/(max-min))*(h-pad*2); return [x,y]; });
  const path = pts.map((p,i)=> (i===0?"M":"L")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const dots = pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="var(--brass)"/>`).join("");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none"><path d="${path}" fill="none" stroke="var(--brass)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;
}

function classifyPhase(entries){
  if (entries.length < 3) return { name:"Honeymoon Phase", note:"Everything feels fresh, engaging, and novel. Cultural adaptation fatigue typically emerges slightly later in the journey." };
  const recent = entries.slice(-5).map(e=>e.mood); const avg = recent.reduce((a,b)=>a+b,0)/recent.length;
  if (avg < 2.5) return { name:"Culture Shock Phase", note:"Frustrations with host habits or mental fatigue are prominent. This is a vital sign of cognitive growth as your mind adapts to alternative logic." };
  if (avg < 3.6) return { name:"Adjustment Phase", note:"You are steadily decoding unwritten social rules and establishing functional everyday routines in your host environment." };
  return { name:"Acceptance Phase", note:"You are successfully holding both cultural frames, operating comfortably and authentically without constant friction." };
}

  openModal(`<div class="sheet-handle"></div><button class="sheet-close" style="position:absolute; top:18px; right:18px;" onclick="closeModal();">✕</button>
    <div class="sheet-title" style="font-family:var(--display); font-weight:900; font-size:20px;">Reflection Prompt</div>
    <div class="card" style="background:var(--parchment-dim); border:none; margin:12px 0 16px; box-shadow:none;"><p id="entryPromptText" style="font-size:14.5px; font-weight:700; margin:0; line-height:1.6; color:var(--text-main);">${escapeHtml(JOURNAL_PROMPTS[promptIdx])}</p>
      <button class="btn btn-ghost" style="margin-top:12px; font-size:12px; padding:6px 12px; box-shadow:none;" onclick="shufflePrompt();">🎲 Shuffle New Prompt</button></div>
    <textarea id="entryText" rows="6" placeholder="Write freely. There are no graded metrics here — just focus on analyzing your framework."></textarea><div style="height:14px;"></div><button class="btn btn-brass btn-block" onclick="saveEntry();">Save Entry</button>`);
  document.getElementById("modalSheet").dataset.promptIdx = promptIdx;
}
function shufflePrompt(){ const sheet = document.getElementById("modalSheet"); let idx = Math.floor(Math.random()*JOURNAL_PROMPTS.length); sheet.dataset.promptIdx = idx; document.getElementById("entryPromptText").textContent = JOURNAL_PROMPTS[idx]; }
async function saveEntry(){ const text = document.getElementById("entryText").value.trim(); if (!text) return; const idx = parseInt(document.getElementById("modalSheet").dataset.promptIdx, 10); STATE.journal.push({ id: uid(), date: todayStr(), prompt: JOURNAL_PROMPTS[idx], text }); await storeSet("journal-entries", STATE.journal); closeModal(); renderJournal(); renderHome(); renderGrowth(); }
function viewEntry(id){
  const j = STATE.journal.find(e => e.id === id); if (!j) return;
  openModal(`<div class="sheet-handle"></div><button class="sheet-close" style="position:absolute; top:18px; right:18px;" onclick="closeModal();">✕</button>
    <div class="eyebrow">${fmtDateLong(j.date)}</div><div class="sheet-title" style="font-size:16px; margin-top:6px; font-weight:800; line-height:1.4;">${escapeHtml(j.prompt)}</div>
    <p style="font-size:14.5px; font-weight:600; line-height:1.65; white-space:pre-wrap; margin-top:14px; color:var(--text-main);">${escapeHtml(j.text)}</p>
    <button class="btn btn-ghost btn-block" style="margin-top:18px; color:var(--rust); border-color:var(--rust); box-shadow:none;" onclick="deleteEntry('${j.id}');">Delete This Entry</button>`);
}
async function deleteEntry(id){ STATE.journal = STATE.journal.filter(e => e.id !== id); await storeSet("journal-entries", STATE.journal); closeModal(); renderJournal(); renderHome(); renderGrowth(); }

/* ================================ GROWTH =================================== */
function renderGrowth(){
  const el = document.getElementById("screen-growth"); const today = todayStr(); const challengeIdx = dayOfYear(new Date()) % CHALLENGES.length; const daysActive = STATE.profile ? Math.max(1, Math.round((new Date(today) - new Date(STATE.profile.createdAt))/86400000)+1) : 1; const values = STATE.tracker.slice(-14).map(e=>e.mood);
  el.innerHTML = `<div class="eyebrow" style="margin-top:8px;">DMIS ASSESSMENT SCHEMA</div><div class="screen-title" style="margin-top:2px; font-size:24px;">Development Visible</div><div class="screen-sub">Tracking orientation changes across Milton Bennett's Developmental Model of Intercultural Sensitivity.</div>
    <div class="card"><div class="dial-wrap">${compassDialSVG(STATE.dmis ? STATE.dmis.stageIndex : null, {size:190})}
        ${STATE.dmis ? `<div class="dial-stage-name" style="font-weight:900; font-size:20px; color:var(--ink-navy); margin-top:6px;">${DMIS_STAGES[STATE.dmis.stageIndex].name}</div><div class="dial-stage-group" style="font-weight:800; font-size:12px; color:var(--brass); margin-top:2px;">Metric Score: ${STATE.dmis.score} / 60 (Stage: ${DMIS_STAGES[STATE.dmis.stageIndex].group})</div><p style="font-size:13.5px; font-weight:700; color:var(--text-mute); line-height:1.6; margin:12px 4px 14px;">${DMIS_STAGES[STATE.dmis.stageIndex].blurb}</p>` : `<div class="dial-stage-name" style="font-weight:900; font-size:17px; margin-top:6px;">Sensitivity Level Unmeasured</div><div class="dial-stage-group" style="color:var(--brass); font-weight:800; font-size:11px;">Complete the core self-assessment to map your developmental frame.</div><div style="height:12px;"></div>`}</div>
      <button class="btn ${STATE.dmis?'btn-ghost':'btn-brass'} btn-block" onclick="startQuiz();">Evaluate Intercultural Stage</button></div>
    <div class="section-label">LEVEL METRICS</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${daysActive}</div><span class="stat-label">Days Active</span></div>
      <div class="stat-box"><div class="stat-num">${STATE.challenges.streak}</div><span class="stat-label">Current Streak</span></div>
      <div class="stat-box"><div class="stat-num">${STATE.journal.length}</div><span class="stat-label">Total Notes</span></div>
      <div class="stat-box"><div class="stat-num">${Object.keys(STATE.challenges.completedDates).length}</div><span class="stat-label">Cleared Tasks</span></div>
    </div>
    ${values.length ? `<div class="section-label">MOOD TREND LINE</div><div class="card">${sparkline(values)}</div>` : ""}
    <div class="section-label">CHALLENGE POOL (Randomly selected daily)</div>
    <div class="card" style="padding:8px 12px;">${CHALLENGES.map((c,i) => { const isToday = i === challengeIdx; const doneToday = isToday && !!STATE.challenges.completedDates[today]; return `<div class="list-item"><div class="li-icon" style="font-size:14px;">${doneToday ? '✅' : (isToday ? '📍' : '•')}</div><div class="li-body"><div class="li-title" style="${isToday?'font-weight:900; color:var(--ink-navy);':'color:var(--text-mute); font-weight:600;'}">${escapeHtml(c)}</div>${isToday ? `<div class="li-sub" style="color:var(--brass); font-weight:900;">Active Today</div>` : ""}</div></div>`; }).join("")}</div>
    <div class="section-label">UTILITIES</div>
    <div class="card" style="padding:8px 12px;">
      <div class="list-item" onclick="openTranslate();" style="cursor:pointer;"><div class="li-icon">🗣️</div><div class="li-body"><div class="li-title">One-Tap Translation Tool</div><div class="li-sub">Rapid situational phrase alignment utility</div></div>${icon('chevron',16)}</div>
      <div class="list-item" onclick="openEditProfile();" style="cursor:pointer;"><div class="li-icon">⚙️</div><div class="li-body"><div class="li-title">Modify Target Route</div><div class="li-sub">Current setup: ${escapeHtml(STATE.profile.home)} ➔ ${escapeHtml(STATE.profile.host)}</div></div>${icon('chevron',16)}</div>
    </div>`;
}

let quizAnswers = []; let quizIndex = 0;
function startQuiz(){ quizAnswers = new Array(DMIS_QUESTIONS.length).fill(null); quizIndex = 0; renderQuiz(); }
function renderQuiz(){
  const total = DMIS_QUESTIONS.length; const pct = Math.round(((quizIndex)/total)*100);
  openModal(`<div class="sheet-handle"></div><button class="sheet-close" style="position:absolute; top:18px; right:18px;" onclick="closeModal();">✕</button>
    <div class="eyebrow">DMIS Evaluation · ${quizIndex+1} / ${total}</div><div class="quiz-progress" style="margin-top:12px;"><div class="quiz-progress-fill" style="width:${pct}%;"></div></div>
    <p style="font-size:18px; line-height:1.5; font-family:var(--display); font-weight:800; margin:4px 0 18px; color:var(--ink-navy);">${escapeHtml(DMIS_QUESTIONS[quizIndex])}</p>
    ${["Strongly Disagree","Disagree","Neutral","Agree","Strongly Agree"].map((label,i)=>`<button class="quiz-opt" style="display:block; width:100%; text-align:left; background:#fff; border:2px solid var(--line); border-radius:16px; padding:14px; margin-bottom:10px; font-size:14.5px; font-weight:700; cursor:pointer;" onclick="answerQuiz(${i+1})">${label}</button>`).join("")}`);
}
function answerQuiz(val){ quizAnswers[quizIndex] = val; if (quizIndex < DMIS_QUESTIONS.length - 1){ quizIndex++; renderQuiz(); } else { finishQuiz(); } }
async function finishQuiz(){
  const total = quizAnswers.reduce((a,b)=>a+b,0); const stageIndex = scoreToStageIndex(total); STATE.dmis = { stageIndex, score: total, date: todayStr() }; await persistUserState(); const stage = DMIS_STAGES[stageIndex];
  openModal(`<div class="sheet-handle"></div>
    <div style="text-align:center; padding-top:6px;">${compassDialSVG(stageIndex, {size:190})}
      <div class="dial-stage-group" style="font-weight:800; color:var(--brass); font-size:12px; margin-top:12px;">Evaluation Cluster: ${stage.group}</div>
      <div class="dial-stage-name" style="font-size:22px; font-weight:900; color:var(--ink-navy); margin-top:2px;">${stage.name}</div>
      <p style="font-size:14px; font-weight:700; color:var(--text-mute); line-height:1.6; margin:12px 4px 20px;">${stage.blurb}</p>
      <button class="btn btn-primary btn-block" onclick="closeModal(); renderGrowth(); renderHome(); renderCoach(); switchTab('growth');">Confirm Mapping</button>
    </div>`);
}

const TRANSLATE_LANGS = ["English","Japanese","Spanish","French","German","Mandarin Chinese","Korean","Portuguese","Arabic","Hindi","Vietnamese","Thai","Russian","Italian"];
function openTranslate(){
  openModal(`<div class="sheet-handle"></div><button class="sheet-close" style="position:absolute; top:18px; right:18px;" onclick="closeModal();">✕</button>
    <div class="sheet-title" style="font-family:var(--display); font-weight:900; font-size:22px;">Quick Translate</div><p class="screen-sub" style="margin-bottom:16px;">Translate phrases rapidly for everyday local navigation scenarios.</p>
    <div class="field"><label class="field-label">Source Text</label><textarea id="trText" rows="3" placeholder="Type a phrase here…"></textarea></div>
    <div class="field"><label class="field-label">Target Language</label><select id="trLang">${TRANSLATE_LANGS.map(l=>`<option value="${l}">${l}</option>`).join("")}</select></div>
    <button class="btn btn-brass btn-block" onclick="runTranslate();">Execute Translation</button><div id="trResult"></div>`);
}
async function runTranslate(){
  const text = document.getElementById("trText").value.trim(); const lang = document.getElementById("trLang").value; const resultEl = document.getElementById("trResult"); if (!text){ return; }
  resultEl.innerHTML = `<p style="margin-top:14px; font-size:13.5px; font-weight:700; color:var(--text-mute);">Processing...</p>`;
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 300, system: `You are a translation tool. Translate the user's text into ${lang}. Respond with ONLY the translation and nothing else — no notes, no quotation marks, no explanation.`, messages: [{ role:"user", content: text }] }) });
    const data = await response.json(); const out = (data.content||[]).map(b=>b.text||"").join("").trim();
    resultEl.innerHTML = `<div class="card" style="background:var(--parchment-dim); border:none; margin-top:14px; box-shadow:none;"><div class="eyebrow" style="margin-bottom:6px;">${lang.toUpperCase()}</div><p style="font-size:15.5px; font-weight:800; margin:0; line-height:1.55; color:var(--ink-navy);">${escapeHtml(out || "Translation string mapping failed.")}</p></div>`;
  }catch(e){
    resultEl.innerHTML = `<p style="margin-top:14px; font-size:13.5px; font-weight:700; color:var(--rust);">Data error. Please verify network access and try again.</p>`;
  }
}

boot();
</script>
</body>
</html>
